<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TL.TAKSO — Клиент</title>

<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body, html { margin:0; padding:0; height:100%; font-family:sans-serif; background:#121212; }
#map { position:absolute; top:0; bottom:0; width:100%; }

.controls {
  position:absolute;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  flex-direction: column;
  gap:10px;
  z-index:2;
  width: 90%;
  max-width: 300px;
  background: rgba(0,0,0,0.7);
  padding: 12px;
  border-radius: 16px;
  backdrop-filter: blur(10px);
}

.buttons {
  display: flex;
  gap: 10px;
  justify-content: center;
}

button {
  padding:12px 18px;
  border:none;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
}

#callTaxi { background:#FFD600; color:#000; }
#cancelRide { background:#FF3B30; color:#fff; }
#contactDriver { background:#00E676; color:#000; }

#fromAddress, #toAddress {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #333;
  background: #1a1a1a;
  color: white;
  font-size: 14px;
  box-sizing: border-box;
  text-align: center;
}

.toast {
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:#FFD600;
  padding:10px 20px;
  border-radius:20px;
  font-weight:700;
  opacity:0;
  transition:0.3s;
  z-index:100;
}
.toast.show { opacity:1; }

.status-panel {
  position:absolute;
  bottom:160px;
  left:50%;
  transform:translateX(-50%);
  background:#1a1a1a;
  padding:12px 20px;
  border-radius:20px;
  text-align:center;
  z-index:2;
  min-width:200px;
  border:1px solid #333;
  display:none;
}
.status-title { font-weight:bold; margin-bottom:4px; }
.status-sub { font-size:12px; color:#888; }
</style>
</head>
<body>

<div id="map"></div>

<div class="controls">
  <input type="text" id="fromAddress" placeholder="📍 Откуда едем?" value="Моя точка">
  <input type="text" id="toAddress" placeholder="🏁 Куда едем?">
  <div class="buttons">
    <button id="callTaxi">🚖 Вызвать</button>
    <button id="cancelRide">❌ Отмена</button>
    <button id="contactDriver">📞 Водитель</button>
  </div>
</div>

<div class="status-panel" id="statusPanel">
  <div class="status-title" id="statusTitle">Ищем водителя...</div>
  <div class="status-sub" id="statusSub">Обычно до 2 минут</div>
</div>

<div class="toast" id="toast"></div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const USER_ID = tg.initDataUnsafe?.user?.id;
const USER_NAME = tg.initDataUnsafe?.user?.first_name || "Клиент";

let map;
let myLat = 59.4370;
let myLon = 24.7536;
let orderId = null;
let taxiMarker = null;
let pollTimer = null;

mapboxgl.accessToken = 'pk.eyJ1IjoidGx0YWtzbyIsImEiOiJjbW4zYW0yMGkxNG13MnByM2hoZng0OXh2In0.ArR_nk-dVg99VhuuatH2hA';

map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/dark-v11',
  center: [myLon, myLat],
  zoom: 12,
  attributionControl:false
});

navigator.geolocation.watchPosition(pos => {
  myLat = pos.coords.latitude;
  myLon = pos.coords.longitude;
  if (window.userMarker) {
    window.userMarker.setLngLat([myLon, myLat]);
  } else {
    window.userMarker = new mapboxgl.Marker({ color: '#4CAF50' })
      .setLngLat([myLon, myLat])
      .addTo(map);
  }
}, ()=>{}, {enableHighAccuracy:true});

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

function showStatusPanel(status) {
  const panel = document.getElementById('statusPanel');
  const title = document.getElementById('statusTitle');
  const sub = document.getElementById('statusSub');
  panel.style.display = 'block';
  
  const statusMap = {
    pending: { title: '⏳ Ищем водителя...', sub: 'Обычно до 2 минут' },
    accepted: { title: '🚖 Водитель едет к вам!', sub: 'Скоро будет у вас' },
    arrived: { title: '📍 Водитель прибыл!', sub: 'Выходите, он ждёт' },
    done: { title: '✅ Поездка завершена', sub: 'Спасибо за поездку!' },
    cancelled: { title: '❌ Заказ отменён', sub: '' }
  };
  const s = statusMap[status] || statusMap.pending;
  title.textContent = s.title;
  sub.textContent = s.sub;
  
  if (status === 'done') {
    setTimeout(() => {
      hideStatusPanel();
      orderId = null;
      if (taxiMarker) { taxiMarker.remove(); taxiMarker = null; }
      showToast("✅ Заказ завершён! Можете заказать снова");
    }, 3000);
  }
}

function hideStatusPanel() {
  document.getElementById('statusPanel').style.display = 'none';
}

async function pollOrderStatus() {
  if (!orderId) return;
  try {
    const res = await fetch(`/api/order_status/${orderId}`);
    if (res.status === 404) {
      stopPolling();
      orderId = null;
      if (taxiMarker) { taxiMarker.remove(); taxiMarker = null; }
      hideStatusPanel();
      return;
    }
    const data = await res.json();
    if (data.ok) {
      showStatusPanel(data.status);
      if (data.status === 'accepted' && data.driver_lat && data.driver_lon) {
        if (!taxiMarker) {
          taxiMarker = new mapboxgl.Marker({ color: '#FFD600' })
            .setLngLat([data.driver_lon, data.driver_lat])
            .addTo(map);
        } else {
          taxiMarker.setLngLat([data.driver_lon, data.driver_lat]);
        }
      }
      if (data.status === 'done' || data.status === 'cancelled') {
        stopPolling();
        if (taxiMarker) { taxiMarker.remove(); taxiMarker = null; }
        if (data.status === 'cancelled') {
          setTimeout(() => hideStatusPanel(), 2000);
        }
        orderId = null;
      }
    }
  } catch(e) { console.error('Poll error:', e); }
}

function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(pollOrderStatus, 3000);
}

function stopPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = null;
}

async function checkActiveOrder() {
  if (!USER_ID) return false;
  try {
    const res = await fetch(`/api/active_order?user_id=${USER_ID}`);
    const data = await res.json();
    if (data.ok && data.order_id) {
      orderId = data.order_id;
      showStatusPanel(data.status);
      startPolling();
      return true;
    }
  } catch(e) { console.error(e); }
  return false;
}

document.getElementById('callTaxi').onclick = async () => {
  if (orderId) {
    showToast("У вас уже есть активный заказ!");
    return;
  }
  
  const fromAddress = document.getElementById('fromAddress').value.trim();
  const toAddress = document.getElementById('toAddress').value.trim();
  
  if (!fromAddress) {
    showToast("📍 Введите адрес отправки");
    return;
  }
  if (!toAddress) {
    showToast("🏁 Введите адрес назначения");
    return;
  }
  
  try {
    const r = await fetch('/api/create_order', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        client_id: USER_ID,
        client_name: USER_NAME,
        from_lat: myLat,
        from_lon: myLon,
        from_address: fromAddress,
        to_address: toAddress,
        price: 8,
        driver_gets: 7,
        payment: "cash",
        time: "Сейчас"
      })
    });
    const res = await r.json();
    if(res.ok){
      orderId = res.order_id;
      showStatusPanel('pending');
      startPolling();
      showToast("🚖 Заказ создан, ищем водителя...");
    } else {
      showToast("❌ Ошибка: " + (res.error || "неизвестная"));
    }
  } catch(e){
    showToast("❌ Ошибка сети");
  }
};

document.getElementById('cancelRide').onclick = async () => {
  if(!orderId) { showToast("Нет активного заказа"); return; }
  if (!confirm('Отменить заказ?')) return;
  try {
    await fetch(`/api/cancel_order_client/${orderId}`, {method:'POST'});
    stopPolling();
    orderId = null;
    hideStatusPanel();
    if(taxiMarker){ taxiMarker.remove(); taxiMarker = null; }
    showToast("❌ Заказ отменён");
  } catch(e){ showToast("❌ Ошибка отмены"); }
};

document.getElementById('contactDriver').onclick = () => {
  if(!orderId) { showToast("Нет активного заказа"); return; }
  showToast("📞 Связь с водителем появится позже");
};

checkActiveOrder().then(hasActive => {
  if (!hasActive) hideStatusPanel();
});
</script>
</body>
</html>
