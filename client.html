<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TL.TAKSO — Клиент</title>

<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body, html { margin:0; padding:0; height:100%; font-family:sans-serif; background:#121212; }
#map { position:absolute; top:0; bottom:0; width:100%; }

.controls {
  position:absolute;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  z-index:2;
}

button {
  padding:12px 18px;
  border:none;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
}

#callTaxi { background:#FFD600; color:#000; }
#cancelRide { background:#FF3B30; color:#fff; }
#contactDriver { background:#00E676; color:#000; }

.toast {
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:#FFD600;
  padding:10px 20px;
  border-radius:20px;
  font-weight:700;
  opacity:0;
  transition:0.3s;
  z-index:100;
}
.toast.show { opacity:1; }

.status-panel {
  position:absolute;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  background:#1a1a1a;
  padding:12px 20px;
  border-radius:20px;
  text-align:center;
  z-index:2;
  min-width:200px;
  border:1px solid #333;
  display:none;
}
.status-title { font-weight:bold; margin-bottom:4px; }
.status-sub { font-size:12px; color:#888; }
</style>
</head>
<body>

<div id="map"></div>

<div class="controls">
  <button id="callTaxi">🚖 Вызвать</button>
  <button id="cancelRide">❌ Отмена</button>
  <button id="contactDriver">📞 Водитель</button>
</div>

<div class="status-panel" id="statusPanel">
  <div class="status-title" id="statusTitle">Ищем водителя...</div>
  <div class="status-sub" id="statusSub">Обычно до 2 минут</div>
</div>

<div class="toast" id="toast"></div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

// ── ДАННЫЕ ──
const USER_ID = tg.initDataUnsafe?.user?.id;
const USER_NAME = tg.initDataUnsafe?.user?.first_name || "Клиент";

let map;
let myLat = 59.4370;
let myLon = 24.7536;

let orderId = null;
let taxiMarker = null;
let pollTimer = null;

// ── MAP ──
mapboxgl.accessToken = 'pk.eyJ1IjoidGx0YWtzbyIsImEiOiJjbW4zYW0yMGkxNG13MnByM2hoZng0OXh2In0.ArR_nk-dVg99VhuuatH2hA';

map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/dark-v11',
  center: [myLon, myLat],
  zoom: 12,
  attributionControl:false
});

// ── GEO ──
navigator.geolocation.watchPosition(pos => {
  myLat = pos.coords.latitude;
  myLon = pos.coords.longitude;
}, ()=>{}, {enableHighAccuracy:true});

// ── TOAST ──
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

// ── ПОКАЗАТЬ ПАНЕЛЬ СТАТУСА ──
function showStatusPanel(status) {
  const panel = document.getElementById('statusPanel');
  const title = document.getElementById('statusTitle');
  const sub = document.getElementById('statusSub');
  
  panel.style.display = 'block';
  
  const statusMap = {
    pending: { title: '⏳ Ищем водителя...', sub: 'Обычно до 2 минут' },
    accepted: { title: '🚖 Водитель едет к вам!', sub: 'Скоро будет у вас' },
    arrived: { title: '📍 Водитель прибыл!', sub: 'Выходите, он ждёт' },
    done: { title: '✅ Поездка завершена', sub: 'Спасибо за поездку!' },
    cancelled: { title: '❌ Заказ отменён', sub: '' }
  };
  const s = statusMap[status] || statusMap.pending;
  title.textContent = s.title;
  sub.textContent = s.sub;
  
  if (status === 'done') {
    setTimeout(() => {
      tg.close();
    }, 2500);
  }
}

function hideStatusPanel() {
  document.getElementById('statusPanel').style.display = 'none';
}

// ── ОПРОС СТАТУСА ЗАКАЗА ──
async function pollOrderStatus() {
  if (!orderId) return;
  try {
    const res = await fetch(`/api/order_status/${orderId}`);
    if (res.status === 404) {
      // Заказ исчез
      stopPolling();
      orderId = null;
      if (taxiMarker) { taxiMarker.remove(); taxiMarker = null; }
      hideStatusPanel();
      return;
    }
    const data = await res.json();
    if (data.ok) {
      showStatusPanel(data.status);
      
      // Если водитель принял заказ и есть его позиция
      if (data.status === 'accepted' && data.driver_lat && data.driver_lon) {
        if (!taxiMarker) {
          taxiMarker = new mapboxgl.Marker({ color: '#FFD600' })
            .setLngLat([data.driver_lon, data.driver_lat])
            .addTo(map);
        } else {
          taxiMarker.setLngLat([data.driver_lon, data.driver_lat]);
        }
      }
      
      // Если заказ завершён или отменён
      if (data.status === 'done' || data.status === 'cancelled') {
        stopPolling();
        if (taxiMarker) { taxiMarker.remove(); taxiMarker = null; }
        if (data.status === 'done') {
          setTimeout(() => hideStatusPanel(), 3000);
        } else if (data.status === 'cancelled') {
          setTimeout(() => hideStatusPanel(), 2000);
        }
        orderId = null;
      }
    }
  } catch(e) {
    console.error('Poll error:', e);
  }
}

function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(pollOrderStatus, 3000);
}

function stopPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = null;
}

// ── ПРОВЕРКА АКТИВНОГО ЗАКАЗА (ПРИ ПРЯМОМ ОТКРЫТИИ) ──
async function checkActiveOrder() {
  if (!USER_ID) return false;
  try {
    const res = await fetch(`/api/active_order?user_id=${USER_ID}`);
    const data = await res.json();
    if (data.ok && data.order_id) {
      orderId = data.order_id;
      showStatusPanel(data.status);
      startPolling();
      return true;
    }
  } catch(e) {
    console.error('Ошибка проверки активного заказа:', e);
  }
  return false;
}

// ── ВЫЗОВ ТАКСИ ──
document.getElementById('callTaxi').onclick = async () => {
  // Если уже есть активный заказ
  if (orderId) {
    showToast("У вас уже есть активный заказ!");
    return;
  }
  
  try {
    const r = await fetch('/api/create_order', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        client_id: USER_ID,
        client_name: USER_NAME,
        from_lat: myLat,
        from_lon: myLon,
        from_address: "Моя точка",
        to_address: "Не указано",
        price: 8,
        driver_gets: 7,
        payment: "cash",
        time: "Сейчас"
      })
    });

    const res = await r.json();

    if(res.ok){
      orderId = res.order_id;
      showStatusPanel('pending');
      startPolling();
      showToast("🚖 Заказ создан, ищем водителя...");
    } else {
      showToast("❌ Ошибка: " + (res.error || "неизвестная"));
    }

  } catch(e){
    showToast("❌ Ошибка сети");
  }
};

// ── ОТМЕНА ──
document.getElementById('cancelRide').onclick = async () => {
  if(!orderId) {
    showToast("Нет активного заказа");
    return;
  }
  
  if (!confirm('Отменить заказ?')) return;

  try {
    await fetch(`/api/cancel_order_client/${orderId}`, {method:'POST'});
    stopPolling();
    orderId = null;
    hideStatusPanel();

    if(taxiMarker){
      taxiMarker.remove();
      taxiMarker = null;
    }

    showToast("❌ Заказ отменён");

  } catch(e){
    showToast("❌ Ошибка отмены");
  }
};

// ── СВЯЗЬ ──
document.getElementById('contactDriver').onclick = () => {
  if(!orderId) {
    showToast("Нет активного заказа");
    return;
  }
  showToast("📞 Связь с водителем появится позже");
};

// ── ЗАПУСК ──
// Сначала проверяем, есть ли активный заказ
checkActiveOrder().then(hasActive => {
  if (!hasActive) {
    hideStatusPanel();
  }
});
</script>
</body>
</html>
