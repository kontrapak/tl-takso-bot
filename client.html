<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TL.TAKSO</title>

<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body { margin:0; font-family:sans-serif; background:#111; color:#fff; }
#map { position:absolute; top:0; bottom:0; width:100%; }

.panel {
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  background:#1a1a1a;
  padding:14px;
  border-top-left-radius:18px;
  border-top-right-radius:18px;
  z-index:10;
}

.hidden { display:none; }

.big-btn {
  width:100%;
  padding:14px;
  font-size:18px;
  font-weight:700;
  border:none;
  border-radius:12px;
  background:#FFD600;
  color:#000;
}

.info { font-size:14px; margin-bottom:8px; opacity:0.9; }

.status {
  text-align:center;
  padding:10px;
  font-size:16px;
}

.toast {
  position:absolute;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:#FFD600;
  color:#000;
  padding:10px 16px;
  border-radius:20px;
  font-weight:700;
  opacity:0;
  transition:0.3s;
}
.toast.show { opacity:1; }
</style>
</head>

<body>

<div id="map"></div>

<div id="toast" class="toast"></div>

<!-- PANEL ВЫБОРА -->
<div class="panel" id="selectPanel">
  <div class="info">📍 Тапни по карте чтобы выбрать точку назначения</div>
  <div class="info" id="distance">📏 Расстояние: —</div>
  <div class="info" id="price">💰 Цена: —</div>
  <button class="big-btn" id="orderBtn" disabled>🚖 Заказать</button>
</div>

<!-- СТАТУС -->
<div class="panel hidden" id="statusPanel">
  <div class="status" id="statusText">🚖 Ищем водителя...</div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

mapboxgl.accessToken = "YOUR_MAPBOX_KEY";

const map = new mapboxgl.Map({
  container: "map",
  style: "mapbox://styles/mapbox/dark-v11",
  center: [24.7536, 59.4370],
  zoom: 12
});

let myLat = 59.4370;
let myLon = 24.7536;

let destLat = null;
let destLon = null;

let rideId = null;

// GPS (упрощённо)
navigator.geolocation.getCurrentPosition(pos => {
  myLat = pos.coords.latitude;
  myLon = pos.coords.longitude;
  map.setCenter([myLon, myLat]);
});

// MARK DESTINATION
map.on("click", (e) => {
  destLat = e.lngLat.lat;
  destLon = e.lngLat.lng;

  const distKm = calcKm(myLat, myLon, destLat, destLon);
  const price = Math.max(8, distKm * 1);

  document.getElementById("distance").innerText = "📏 " + distKm.toFixed(1) + " km";
  document.getElementById("price").innerText = "💰 " + price.toFixed(2) + " €";

  document.getElementById("orderBtn").disabled = false;
});

// PRICE CALC
function calcKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI/180;
  const dLon = (lon2 - lon1) * Math.PI/180;

  const a =
    Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(lat1*Math.PI/180) *
    Math.cos(lat2*Math.PI/180) *
    Math.sin(dLon/2) * Math.sin(dLon/2);

  return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

// ORDER
document.getElementById("orderBtn").onclick = async () => {
  try {
    const res = await fetch("/api/create_order", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        from_lat: myLat,
        from_lon: myLon,
        to_lat: destLat,
        to_lon: destLon
      })
    });

    const data = await res.json();

    if (data.ok) {
      rideId = data.order_id;

      document.getElementById("selectPanel").classList.add("hidden");
      document.getElementById("statusPanel").classList.remove("hidden");
      document.getElementById("statusText").innerText = "🚖 Водитель найден";

      showToast("Заказ создан");
    } else {
      showToast("Ошибка заказа");
    }
  } catch (e) {
    showToast("Ошибка сети");
  }
};

// STATUS POLL
setInterval(async () => {
  if (!rideId) return;

  const res = await fetch("/api/order_status/" + rideId);
  if (!res.ok) return;

  const data = await res.json();

  if (data.status === "completed") {
    document.getElementById("statusText").innerText = "🏁 Поездка завершена";
  }
}, 3000);

// TOAST
function showToast(text) {
  const t = document.getElementById("toast");
  t.innerText = text;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2000);
}
</script>

</body>
</html>
