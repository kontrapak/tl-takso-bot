<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TL.TAKSO — Панель водителя</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: #f0f0f0;
            font-family: 'IBM Plex Mono', monospace;
            padding: 16px;
            padding-bottom: 80px;
        }

        /* Хедер */
        .header {
            background: rgba(255, 214, 0, 0.08);
            border: 1px solid rgba(255, 214, 0, 0.3);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .header h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 28px;
            color: #FFD600;
            letter-spacing: 2px;
        }

        .driver-status {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 230, 118, 0.15);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 12px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00e676;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        .stats {
            display: flex;
            gap: 16px;
            margin-top: 12px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 8px 16px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-family: 'Bebas Neue', sans-serif;
            color: #FFD600;
        }

        .stat-label {
            font-size: 10px;
            color: #888;
            text-transform: uppercase;
        }

        /* Заказы */
        .orders-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #FFD600;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .orders-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .order-card {
            background: rgba(255, 214, 0, 0.04);
            border: 1px solid rgba(255, 214, 0, 0.2);
            border-radius: 20px;
            padding: 16px;
            transition: all 0.3s;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .order-card.waiting {
            border-left: 4px solid #FFD600;
            background: rgba(255, 214, 0, 0.06);
        }

        .order-card.accepted {
            border-left: 4px solid #00e676;
            opacity: 0.8;
        }

        .order-card.cancelled {
            border-left: 4px solid #ff4444;
            opacity: 0.5;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 11px;
            color: #FFD600;
        }

        .order-id {
            background: rgba(255, 214, 0, 0.15);
            padding: 4px 8px;
            border-radius: 6px;
            font-family: monospace;
        }

        .order-time {
            color: #888;
        }

        .order-price {
            font-size: 32px;
            font-family: 'Bebas Neue', sans-serif;
            color: #FFD600;
            margin: 8px 0;
        }

        .address {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 12px;
            margin: 12px 0;
            font-size: 13px;
            line-height: 1.5;
        }

        .address-row {
            display: flex;
            gap: 10px;
            margin-bottom: 8px;
        }

        .address-icon {
            width: 24px;
            text-align: center;
        }

        .address-text {
            flex: 1;
            word-break: break-word;
        }

        .btn-accept {
            width: 100%;
            background: #FFD600;
            color: #000;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 18px;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
            font-weight: bold;
        }

        .btn-accept:active {
            transform: scale(0.98);
        }

        .btn-accept:disabled {
            opacity: 0.5;
            transform: none;
        }

        .driver-info {
            background: rgba(0, 230, 118, 0.1);
            border-radius: 12px;
            padding: 10px;
            margin-top: 12px;
            font-size: 12px;
            text-align: center;
        }

        /* Пустое состояние */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        /* Нижняя панель */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 10, 10, 0.98);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 214, 0, 0.2);
            padding: 12px 16px;
            display: flex;
            gap: 12px;
            z-index: 100;
        }

        .driver-btn {
            flex: 1;
            background: rgba(255, 214, 0, 0.1);
            border: 1px solid rgba(255, 214, 0, 0.3);
            padding: 12px;
            border-radius: 40px;
            color: #FFD600;
            font-family: monospace;
            font-size: 14px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }

        .driver-btn.active {
            background: #FFD600;
            color: #000;
            border-color: #FFD600;
        }

        .driver-btn:active {
            transform: scale(0.97);
        }

        /* Уведомление */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            left: 20px;
            background: #FFD600;
            color: #000;
            padding: 14px 18px;
            border-radius: 16px;
            font-size: 13px;
            font-weight: bold;
            z-index: 200;
            transform: translateX(200%);
            transition: transform 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .notification.show {
            transform: translateX(0);
        }

        /* Звук */
        .sound-toggle {
            position: fixed;
            bottom: 80px;
            right: 16px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #FFD600;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        @media (max-width: 480px) {
            body {
                padding: 12px;
                padding-bottom: 80px;
            }
            .order-price {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>

<div class="notification" id="notification">🔔 Новый заказ!</div>
<div class="sound-toggle" id="soundToggle" onclick="toggleSound()">🔊</div>

<div class="header">
    <h1>🚖 TL.TAKSO</h1>
    <div class="driver-status">
        <div class="status-badge">
            <div class="status-dot"></div>
            <span id="driverStatusText">Онлайн</span>
        </div>
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="waitingCount">0</div>
                <div class="stat-label">Ожидают</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="acceptedCount">0</div>
                <div class="stat-label">Принято</div>
            </div>
        </div>
    </div>
</div>

<div class="orders-title">
    <span>📋 АКТИВНЫЕ ЗАКАЗЫ</span>
    <span id="refreshTime" style="font-size: 10px; color: #666;"></span>
</div>

<div class="orders-list" id="ordersList">
    <div class="empty-state">
        <div class="empty-state-icon">🚕</div>
        <div>Нет активных заказов</div>
        <div style="font-size: 11px; margin-top: 8px;">Ожидайте новых заказов...</div>
    </div>
</div>

<div class="bottom-bar">
    <div class="driver-btn" id="onlineBtn" onclick="setDriverStatus('online')">🟢 Онлайн</div>
    <div class="driver-btn" id="offlineBtn" onclick="setDriverStatus('offline')">🔴 Офлайн</div>
</div>

<script>
    // Конфигурация (замените на ваш URL)
    const API_URL = window.location.origin; // Автоматически подхватывает текущий домен
    
    let driverId = localStorage.getItem('driverId');
    if (!driverId) {
        driverId = 'driver_' + Math.random().toString(36).substr(2, 8);
        localStorage.setItem('driverId', driverId);
    }
    
    let driverName = localStorage.getItem('driverName') || `Водитель ${driverId.slice(-5)}`;
    let isOnline = true;
    let soundEnabled = true;
    let lastOrderIds = new Set();
    let refreshInterval;
    
    // Звук (через Web Audio API для надёжности)
    function playNewOrderSound() {
        if (!soundEnabled) return;
        try {
            const audio = new Audio('data:audio/wav;base64,U3RlYWQgbm90aWZpY2F0aW9uIHNvdW5k');
            audio.volume = 0.5;
            audio.play().catch(e => console.log('Audio play failed:', e));
        } catch(e) {}
        
        // Вибрация на мобильных
        if (navigator.vibrate) navigator.vibrate(200);
    }
    
    function toggleSound() {
        soundEnabled = !soundEnabled;
        const btn = document.getElementById('soundToggle');
        btn.textContent = soundEnabled ? '🔊' : '🔇';
        showNotification(soundEnabled ? '🔊 Звук включён' : '🔇 Звук выключен');
    }
    
    function showNotification(message, isError = false) {
        const notif = document.getElementById('notification');
        notif.textContent = message;
        notif.style.background = isError ? '#ff4444' : '#FFD600';
        notif.style.color = isError ? '#fff' : '#000';
        notif.classList.add('show');
        setTimeout(() => notif.classList.remove('show'), 2500);
    }
    
    // Загрузка заказов с сервера
    async function loadOrders() {
        if (!isOnline) return;
        
        try {
            const response = await fetch(`${API_URL}/api/orders`);
            const orders = await response.json();
            
            // Обновляем счётчики
            const waitingOrders = orders.filter(o => o.status === 'waiting');
            const acceptedOrders = orders.filter(o => o.status === 'accepted' && o.driver_id === driverId);
            
            document.getElementById('waitingCount').textContent = waitingOrders.length;
            document.getElementById('acceptedCount').textContent = acceptedOrders.length;
            
            // Проверяем новые заказы
            const newOrders = waitingOrders.filter(o => !lastOrderIds.has(o.id));
            if (newOrders.length > 0) {
                newOrders.forEach(order => {
                    playNewOrderSound();
                    showNotification(`🚖 НОВЫЙ ЗАКАЗ! ${order.price}€`);
                });
            }
            
            // Обновляем список
            renderOrders(orders);
            
            // Обновляем список ID
            lastOrderIds = new Set(orders.map(o => o.id));
            
            document.getElementById('refreshTime').textContent = new Date().toLocaleTimeString();
            
        } catch (error) {
            console.error('Ошибка загрузки заказов:', error);
        }
    }
    
    // Отображение заказов
    function renderOrders(orders) {
        const container = document.getElementById('ordersList');
        const activeOrders = orders.filter(o => o.status === 'waiting' || 
            (o.status === 'accepted' && o.driver_id === driverId));
        
        if (activeOrders.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">🚕</div>
                    <div>Нет активных заказов</div>
                    <div style="font-size: 11px; margin-top: 8px;">Ожидайте новых заказов...</div>
                </div>
            `;
            return;
        }
        
        container.innerHTML = activeOrders.map(order => `
            <div class="order-card ${order.status}" id="order-${order.id}">
                <div class="order-header">
                    <span class="order-id">#${order.id}</span>
                    <span class="order-time">${new Date(order.created_at).toLocaleTimeString()}</span>
                </div>
                <div class="order-price">${order.price}€</div>
                <div class="address">
                    <div class="address-row">
                        <span class="address-icon">📍</span>
                        <span class="address-text"><strong>Откуда:</strong> ${order.from_address}</span>
                    </div>
                    <div class="address-row">
                        <span class="address-icon">🎯</span>
                        <span class="address-text"><strong>Куда:</strong> ${order.to_address}</span>
                    </div>
                </div>
                ${order.status === 'waiting' ? `
                    <button class="btn-accept" onclick="acceptOrder(${order.id})">
                        ✅ ПРИНЯТЬ ЗАКАЗ (${order.price}€)
                    </button>
                ` : order.status === 'accepted' && order.driver_id === driverId ? `
                    <div class="driver-info">
                        🚗 Вы приняли этот заказ<br>
                        Свяжитесь с клиентом для уточнения деталей
                    </div>
                ` : order.status === 'accepted' ? `
                    <div class="driver-info">
                        👤 Заказ принят другим водителем
                    </div>
                ` : ''}
            </div>
        `).join('');
    }
    
    // Принятие заказа
    async function acceptOrder(orderId) {
        if (!isOnline) {
            showNotification('⚠️ Вы не в сети. Включите режим "Онлайн"', true);
            return;
        }
        
        try {
            const response = await fetch(`${API_URL}/api/orders/${orderId}/accept`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    driver_id: driverId,
                    driver_name: driverName
                })
            });
            
            if (response.ok) {
                showNotification(`✅ Заказ #${orderId} принят!`);
                playNewOrderSound();
                loadOrders(); // Обновляем список
            } else {
                throw new Error('Не удалось принять заказ');
            }
        } catch (error) {
            console.error('Ошибка:', error);
            showNotification('❌ Не удалось принять заказ. Возможно, его уже взяли', true);
            loadOrders(); // Обновляем список
        }
    }
    
    // Установка статуса водителя
    function setDriverStatus(status) {
        isOnline = status === 'online';
        const onlineBtn = document.getElementById('onlineBtn');
        const offlineBtn = document.getElementById('offlineBtn');
        const statusText = document.getElementById('driverStatusText');
        
        if (isOnline) {
            onlineBtn.classList.add('active');
            offlineBtn.classList.remove('active');
            statusText.textContent = 'Онлайн';
            statusText.parentElement.style.background = 'rgba(0, 230, 118, 0.15)';
            loadOrders(); // Сразу загружаем заказы
            startAutoRefresh();
        } else {
            onlineBtn.classList.remove('active');
            offlineBtn.classList.add('active');
            statusText.textContent = 'Офлайн';
            statusText.parentElement.style.background = 'rgba(255, 68, 68, 0.15)';
            stopAutoRefresh();
            document.getElementById('ordersList').innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">⛔</div>
                    <div>Вы офлайн</div>
                    <div style="font-size: 11px; margin-top: 8px;">Включите режим "Онлайн" для приёма заказов</div>
                </div>
            `;
        }
    }
    
    function startAutoRefresh() {
        if (refreshInterval) clearInterval(refreshInterval);
        refreshInterval = setInterval(loadOrders, 3000); // Обновление каждые 3 секунды
    }
    
    function stopAutoRefresh() {
        if (refreshInterval) {
            clearInterval(refreshInterval);
            refreshInterval = null;
        }
    }
    
    // Инициализация
    function init() {
        // Запрашиваем имя водителя
        const storedName = localStorage.getItem('driverName');
        if (!storedName) {
            const name = prompt('Введите ваше имя (для отображения клиентам):', `Водитель ${driverId.slice(-5)}`);
            if (name) {
                driverName = name;
                localStorage.setItem('driverName', name);
            }
        } else {
            driverName = storedName;
        }
        
        setDriverStatus('online');
        
        // Запрос разрешения на уведомления
        if ('Notification' in window && Notification.permission === 'default') {
            Notification.requestPermission();
        }
    }
    
    // Запуск
    init();
</script>
</body>
</html>
