<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>TL.TAKSO</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet"/>
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: -apple-system, sans-serif; background:#000; color:#fff; height:100vh; overflow:hidden; }
    #map { position:absolute; inset:0; }

    #panel {
      position:absolute; bottom:0; left:0; right:0;
      background:#111; border-radius:20px 20px 0 0;
      padding:16px; z-index:10;
      box-shadow: 0 -4px 20px rgba(255,200,0,0.15);
      transition: transform 0.3s ease;
    }
    #panel.hidden { transform: translateY(100%); }

    .drag-handle { width:40px; height:4px; background:#333; border-radius:2px; margin:0 auto 14px; cursor:pointer; }

    .step { display:none; }
    .step.active { display:block; }

    h2 { font-size:16px; color:#FFD700; margin-bottom:12px; }

    .address-box { background:#1a1a1a; border:1px solid #333; border-radius:12px; padding:12px 14px; margin-bottom:10px; cursor:pointer; display:flex; align-items:center; gap:10px; }
    .address-box span { font-size:14px; color:#aaa; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .address-box.filled span { color:#fff; }
    .dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    .dot.from { background:#4CAF50; }
    .dot.to   { background:#FFD700; }

    .tariff-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px; }
    .tariff-btn { background:#1a1a1a; border:1px solid #333; border-radius:12px; padding:12px 8px; text-align:center; cursor:pointer; transition:all 0.2s; }
    .tariff-btn.selected { border-color:#FFD700; background:#1f1a00; }
    .tariff-btn .price { font-size:20px; font-weight:700; color:#FFD700; }
    .tariff-btn .label { font-size:11px; color:#888; margin-top:2px; }

    .pay-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px; }
    .pay-btn { background:#1a1a1a; border:1px solid #333; border-radius:12px; padding:12px; text-align:center; cursor:pointer; transition:all 0.2s; font-size:14px; }
    .pay-btn.selected { border-color:#FFD700; background:#1f1a00; }

    .order-btn { width:100%; padding:15px; background:#FFD700; color:#000; border:none; border-radius:14px; font-size:16px; font-weight:700; cursor:pointer; letter-spacing:0.3px; }
    .order-btn:disabled { background:#444; color:#888; cursor:default; }

    #search-overlay { display:none; position:fixed; inset:0; background:#000; z-index:100; flex-direction:column; padding:16px; }
    #search-overlay.open { display:flex; }
    #search-input { background:#1a1a1a; border:1px solid #FFD700; border-radius:12px; padding:12px 14px; color:#fff; font-size:16px; width:100%; outline:none; margin-bottom:12px; }
    #search-results { flex:1; overflow-y:auto; }
    .search-item { padding:14px 12px; border-bottom:1px solid #1a1a1a; cursor:pointer; font-size:14px; color:#ccc; }
    .search-item strong { color:#fff; display:block; }

    #back-btn { background:none; border:none; color:#FFD700; font-size:16px; padding:0 0 12px; cursor:pointer; }

    #center-marker { position:absolute; top:50%; left:50%; transform:translate(-50%, -100%); z-index:5; pointer-events:none; font-size:32px; line-height:1; display:none; }

    #locate-btn { position:absolute; right:16px; bottom:220px; z-index:10; width:44px; height:44px; background:#111; border:1px solid #333; border-radius:12px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:22px; }

    #confirm-point-btn { display:none; position:absolute; bottom:170px; left:50%; transform:translateX(-50%); z-index:10; background:#FFD700; color:#000; border:none; border-radius:12px; padding:12px 24px; font-size:15px; font-weight:700; cursor:pointer; white-space:nowrap; }

    #toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:#222; color:#fff; padding:10px 20px; border-radius:20px; font-size:13px; z-index:200; opacity:0; transition:opacity 0.3s; pointer-events:none; }
    #toast.show { opacity:1; }
  </style>
</head>
<body>

<div id="map"></div>
<div id="center-marker">📍</div>
<div id="locate-btn" onclick="goToMyLocation()">📡</div>
<button id="confirm-point-btn" onclick="confirmMapPoint()"></button>
<div id="toast"></div>

<div id="search-overlay">
  <button id="back-btn" onclick="closeSearch()">← Назад</button>
  <input id="search-input" type="text" placeholder="Введите адрес..." autocomplete="off"/>
  <div id="search-results"></div>
</div>

<div id="panel">
  <div class="drag-handle"></div>

  <div id="step-addresses" class="step active">
    <h2>🚖 Откуда и куда?</h2>
    <div class="address-box" id="from-box" onclick="openSearch('from')">
      <div class="dot from"></div>
      <span id="from-text">Выберите точку отправления</span>
    </div>
    <div class="address-box" id="to-box" onclick="openSearch('to')">
      <div class="dot to"></div>
      <span id="to-text">Выберите пункт назначения</span>
    </div>
    <button class="order-btn" id="next-to-tariff" onclick="goToTariff()" disabled>Далее →</button>
  </div>

  <div id="step-tariff" class="step">
    <h2>💰 Тариф и оплата</h2>
    <div class="tariff-grid">
      <div class="tariff-btn" onclick="selectTariff(8,'Mustamäe',event)">
        <div class="price">8€</div>
        <div class="label">Mustamäe</div>
      </div>
      <div class="tariff-btn" onclick="selectTariff(10,'Город',event)">
        <div class="price">10€</div>
        <div class="label">Город</div>
      </div>
      <div class="tariff-btn" onclick="selectTariff(15,'Далеко',event)">
        <div class="price">15€</div>
        <div class="label">Далеко</div>
      </div>
      <div class="tariff-btn" onclick="selectTariff(20,'Аэропорт',event)">
        <div class="price">20€</div>
        <div class="label">Аэропорт</div>
      </div>
    </div>
    <div class="pay-row">
      <div class="pay-btn selected" id="pay-cash" onclick="selectPayment('cash')">💵 Наличные</div>
      <div class="pay-btn" id="pay-card" onclick="selectPayment('card')">💳 Карта</div>
    </div>
    <button class="order-btn" id="confirm-order-btn" onclick="sendOrder()" disabled>Заказать такси</button>
  </div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();
tg.enableClosingConfirmation();

const MAPBOX_TOKEN = "pk.eyJ1IjoidGx0YWtzbyIsImEiOiJjbW4zYW0yMGkxNG13MnByM2hoZng0OXh2In0.ArR_nk-dVg99VhuuatH2hA";

let state = { from:null, to:null, price:0, priceLabel:'', payment:'cash', pickingFor:null, myLat:null, myLon:null };

// ── КАРТА ──
mapboxgl.accessToken = MAPBOX_TOKEN;
const map = new mapboxgl.Map({ container: 'map', style: 'mapbox://styles/mapbox/dark-v11', center:[24.7536,59.4370], zoom:12 });

// ── ЛОКАЦИЯ ──
function initLocation() {
  if(tg.LocationManager && tg.LocationManager.isInited!==undefined){tg.LocationManager.init(()=>{
    tg.LocationManager.isLocationAvailable?startTelegramLocation():startBrowserLocation();});} 
  else startBrowserLocation();
}

function startTelegramLocation(){tg.LocationManager.getLocation(loc=>{loc&&updateMyPosition(loc.latitude,loc.longitude);});}

let browserWatchId=null;
function startBrowserLocation(){
  if(!navigator.geolocation)return;
  if(browserWatchId!==null)navigator.geolocation.clearWatch(browserWatchId);
  browserWatchId = navigator.geolocation.watchPosition(pos=>updateMyPosition(pos.coords.latitude,pos.coords.longitude),err=>console.warn('Геолокация:',err.message),{enableHighAccuracy:true,timeout:15000,maximumAge:5000});
}

function updateMyPosition(lat,lon){
  state.myLat=lat; state.myLon=lon;
  if(!window._meMarker){const el=document.createElement('div');el.style.cssText='width:14px;height:14px;background:#4CAF50;border:3px solid #fff;border-radius:50%;box-shadow:0 0 10px rgba(76,175,80,0.8)';window._meMarker=new mapboxgl.Marker({element:el}).setLngLat([lon,lat]).addTo(map);}
  else window._meMarker.setLngLat([lon,lat]);
}

document.addEventListener('visibilitychange',()=>{if(!document.hidden){tg.LocationManager&&tg.LocationManager.isInited?startTelegramLocation():startBrowserLocation();}});
initLocation();
function goToMyLocation(){if(state.myLat&&state.myLon)map.flyTo({center:[state.myLon,state.myLat],zoom:15,duration:800});else{showToast('Геолокация ещё не получена...');initLocation();}}

// ── КАРТА ПИКИНГ ──
function startPickingOnMap(type){state.pickingFor=type;document.getElementById('panel').classList.add('hidden');document.getElementById('center-marker').style.display='block';const btn=document.getElementById('confirm-point-btn');btn.textContent=type==='from'?'✅ Отсюда':'✅ Сюда';btn.style.display='block';}
async function confirmMapPoint(){const center=map.getCenter();const lat=center.lat,lon=center.lng;const address=await reverseGeocode(lat,lon);if(state.pickingFor==='from'){state.from={lat,lon,address};setFromUI(address);}else{state.to={lat,lon,address};setToUI(address);}document.getElementById('panel').classList.remove('hidden');document.getElementById('center-marker').style.display='none';document.getElementById('confirm-point-btn').style.display='none';state.pickingFor=null;checkAddressesReady();}

// ── ПОИСК ──
let searchType=null;
function openSearch(type){searchType=type;document.getElementById('search-overlay').classList.add('open');setTimeout(()=>document.getElementById('search-input').focus(),100);document.getElementById('search-results').innerHTML='';const mapItem=document.createElement('div');mapItem.className='search-item';mapItem.innerHTML='<strong>📍 Выбрать на карте</strong>Нажмите на нужную точку';mapItem.onclick=()=>{closeSearch();startPickingOnMap(type);};document.getElementById('search-results').appendChild(mapItem);}
function closeSearch(){document.getElementById('search-overlay').classList.remove('open');document.getElementById('search-input').value='';searchType=null;}
let searchTimer=null;
document.getElementById('search-input').addEventListener('input',function(){clearTimeout(searchTimer);const q=this.value.trim();if(q.length<2)return;searchTimer=setTimeout(()=>searchAddress(q),400);});
async function searchAddress(query){try{const r=await fetch(`https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(query)}.json?access_token=${MAPBOX_TOKEN}&country=ee&language=ru&limit=5&proximity=24.7536,59.4370`);const d=await r.json();const resultsEl=document.getElementById('search-results');const mapBtn=resultsEl.querySelector('.search-item');resultsEl.innerHTML='';if(mapBtn)resultsEl.appendChild(mapBtn);(d.features||[]).forEach(f=>{const item=document.createElement('div');item.className='search-item';const name=f.text||'';const full=f.place_name||'';item.innerHTML=`<strong>${name}</strong>${full}`;item.onclick=()=>{const [lon,lat]=f.geometry.coordinates;if(searchType==='from'){state.from={lat,lon,address:full};setFromUI(full);}else{state.to={lat,lon,address:full};setToUI(full);}map.flyTo({center:[lon,lat],zoom:14,duration:600});closeSearch();checkAddressesReady();};resultsEl.appendChild(item);});}catch(e){console.error(e);}}
async function reverseGeocode(lat,lon){try{const r=await fetch(`https://api.mapbox.com/geocoding/v5/mapbox.places/${lon},${lat}.json?access_token=${MAPBOX_TOKEN}&language=ru&limit=1`);const d=await r.json();return d.features?.[0]?.place_name||`${lat.toFixed(5)}, ${lon.toFixed(5)}`;}catch(e){return `${lat.toFixed(5)}, ${lon.toFixed(5)}`;}}

// ── UI ──
function setFromUI(address){document.getElementById('from-text').textContent=address;document.getElementById('from-box').classList.add('filled');if(window._fromMarker)window._fromMarker.remove();window._fromMarker=new mapboxgl.Marker({color:'#4CAF50'}).setLngLat([state.from.lon,state.from.lat]).addTo(map);}
function setToUI(address){document.getElementById('to-text').textContent=address;document.getElementById('to-box').classList.add('filled');if(window._toMarker)window._toMarker.remove();window._toMarker=new mapboxgl.Marker({color:'#FFD700'}).setLngLat([state.to.lon,state.to.lat]).addTo(map);}
function checkAddressesReady(){document.getElementById('next-to-tariff').disabled=!(state.from&&state.to);}
function goToTariff(){if(!state.from||!state.to)return;document.getElementById('step-addresses').classList.remove('active');document.getElementById('step-tariff').classList.add('active');const bounds=new mapboxgl.LngLatBounds();bounds.extend([state.from.lon,state.from.lat]);bounds.extend([state.to.lon,state.to.lat]);map.fitBounds(bounds,{padding:60,duration:800});}
function selectTariff(price,label,e){state.price=price;state.priceLabel=label;document.querySelectorAll('.tariff-btn').forEach(b=>b.classList.remove('selected'));e.currentTarget.classList.add('selected');updateOrderBtn();}
function selectPayment(type){state.payment=type;document.getElementById('pay-cash').classList.toggle('selected',type==='cash');document.getElementById('pay-card').classList.toggle('selected',type==='card');}
function updateOrderBtn(){const btn=document.getElementById('confirm-order-btn');btn.disabled=!state.price;btn.textContent=state.price?`Заказать такси · ${state.price}€`:'Заказать такси';}
function sendOrder(){if(!state.from||!state.to||!state.price){showToast('Заполните все поля');return;}const payload={from_address:state.from.address,to_address:state.to.address,from_lat:state.from.lat,from_lon:state.from.lon,to_lat:state.to.lat,to_lon:state.to.lon,price:state.price,driver_gets:state.price-1,payment:state.payment,time:'Сейчас'};tg.WebApp.sendData(JSON.stringify(payload));}
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2500);}
</script>
</body>
</html>
