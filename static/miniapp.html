<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TL.TAKSO</title>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#111; color:#fff; font-family:sans-serif; height:100dvh; overflow:hidden; }

#map { position:absolute; inset:0; }

#locBtn {
  position:absolute; right:14px; bottom:200px; z-index:10;
  width:44px; height:44px; background:#1a1a1a; border:1px solid #333;
  border-radius:12px; display:flex; align-items:center; justify-content:center;
  font-size:22px; cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,0.5);
}

.panel {
  position:absolute; bottom:0; left:0; right:0;
  background:#1a1a1a; border-radius:20px 20px 0 0;
  border-top:2px solid #2a2a2a;
  padding:16px; z-index:10;
}

.hint { font-size:13px; color:#888; margin-bottom:10px; text-align:center; }

.route-box {
  background:#111; border-radius:12px;
  padding:10px 14px; margin-bottom:12px;
}
.route-row {
  display:flex; align-items:center; gap:10px;
  padding:6px 0; font-size:13px;
}
.route-row + .route-row { border-top:1px solid #222; }
.rdot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.rdot.a { background:#4CAF50; }
.rdot.b { background:#FFD600; }
.rtext { color:#666; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.rtext.set { color:#fff; }

.price-row {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:12px;
}
.price-label { font-size:13px; color:#666; }
.price-val { font-size:28px; font-weight:700; color:#FFD600; }

.pay-row { display:flex; gap:8px; margin-bottom:12px; }
.pay-btn {
  flex:1; padding:10px; background:#111; border:1px solid #333;
  border-radius:10px; text-align:center; font-size:13px; cursor:pointer;
  color:#888;
}
.pay-btn.sel { border-color:#FFD600; background:#1f1a00; color:#FFD600; }

.order-btn {
  width:100%; padding:15px; background:#FFD600; color:#000;
  border:none; border-radius:14px; font-size:17px; font-weight:700;
  cursor:pointer;
}
.order-btn:disabled { background:#333; color:#555; cursor:default; }

#statusPanel { display:none; }
.status-icon { font-size:48px; text-align:center; margin-bottom:10px; }
.status-title { font-size:18px; font-weight:700; text-align:center; margin-bottom:4px; }
.status-sub { font-size:13px; color:#888; text-align:center; margin-bottom:16px; }
.cancel-btn {
  width:100%; padding:12px; background:transparent; color:#FF3B30;
  border:1px solid #FF3B30; border-radius:12px; font-size:14px;
  font-weight:700; cursor:pointer;
}

#toast {
  position:fixed; top:16px; left:50%; transform:translateX(-50%);
  background:#FFD600; color:#000; padding:10px 20px; border-radius:30px;
  font-weight:700; font-size:14px; z-index:100;
  opacity:0; transition:opacity 0.3s; pointer-events:none; white-space:nowrap;
}
#toast.show { opacity:1; }

.mapboxgl-ctrl-logo, .mapboxgl-ctrl-attrib, .mapboxgl-ctrl-group { display:none !important; }
</style>
</head>
<body>

<div id="map"></div>
<div id="locBtn" onclick="goToMe()">📡</div>
<div id="toast"></div>

<!-- ПАНЕЛЬ ВЫБОРА -->
<div class="panel" id="selectPanel">
  <div class="hint">Тапните по карте — выберите куда ехать</div>

  <div class="route-box">
    <div class="route-row">
      <div class="rdot a"></div>
      <div class="rtext" id="textA">Определяем геолокацию...</div>
    </div>
    <div class="route-row">
      <div class="rdot b"></div>
      <div class="rtext" id="textB">Выберите на карте</div>
    </div>
  </div>

  <div class="price-row">
    <div class="price-label">Стоимость поездки</div>
    <div class="price-val" id="priceVal">—</div>
  </div>

  <div class="pay-row">
    <div class="pay-btn sel" id="payCash" onclick="setPay('cash')">💵 Наличные</div>
    <div class="pay-btn" id="payCard" onclick="setPay('card')">💳 Карта</div>
  </div>

  <button class="order-btn" id="orderBtn" disabled onclick="placeOrder()">
    🚖 Заказать такси
  </button>
</div>

<!-- ПАНЕЛЬ СТАТУСА -->
<div class="panel" id="statusPanel">
  <div class="status-icon" id="stIcon">⏳</div>
  <div class="status-title" id="stTitle">Ищем водителя...</div>
  <div class="status-sub" id="stSub">Обычно до 2 минут</div>
  <button class="cancel-btn" id="cancelBtn" onclick="cancelOrder()">❌ Отменить заказ</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const MAPBOX     = 'pk.eyJ1IjoidGx0YWtzbyIsImEiOiJjbW4zYW0yMGkxNG13MnByM2hoZng0OXh2In0.ArR_nk-dVg99VhuuatH2hA';
const CLIENT_ID  = tg.initDataUnsafe?.user?.id;
const CLIENT_NAME = tg.initDataUnsafe?.user?.first_name || 'Клиент';

mapboxgl.accessToken = MAPBOX;

let myLat = null, myLon = null;
let destLat = null, destLon = null;
let myAddress   = 'Моя геолокация';
let destAddress = '';
let payment = 'cash';
let orderId = null;
let pollTimer = null;
let markerA = null, markerB = null;

// ── КАРТА ──
const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/dark-v11',
  center: [24.7536, 59.4370],
  zoom: 13,
  attributionControl: false
});

// ── ТАП = точка B ──
map.on('click', e => {
  destLat = e.lngLat.lat;
  destLon = e.lngLat.lng;
  // Маркер B
  if (!markerB) {
    markerB = new mapboxgl.Marker({ color: '#FFD600' })
      .setLngLat([destLon, destLat]).addTo(map);
  } else {
    markerB.setLngLat([destLon, destLat]);
  }
  // Подгоняем вид
  if (myLat) {
    const b = new mapboxgl.LngLatBounds();
    b.extend([myLon, myLat]);
    b.extend([destLon, destLat]);
    map.fitBounds(b, { padding: 80, duration: 600 });
  }
  // Геокодинг адреса B
  reverseGeocode(destLat, destLon).then(addr => {
    destAddress = addr;
    const el = document.getElementById('textB');
    el.textContent = addr;
    el.classList.add('set');
  });
  updateUI();
});

// ── ГЕОЛОКАЦИЯ ──
function initLocation() {
  if (tg.LocationManager && typeof tg.LocationManager.init === 'function') {
    tg.LocationManager.init(() => {
      if (tg.LocationManager.isLocationAvailable) {
        tg.LocationManager.getLocation(loc => {
          if (loc) onPos(loc.latitude, loc.longitude);
          else startBrowserGeo();
        });
      } else startBrowserGeo();
    });
  } else startBrowserGeo();
}

function startBrowserGeo() {
  if (!navigator.geolocation) return;
  navigator.geolocation.watchPosition(
    p => onPos(p.coords.latitude, p.coords.longitude),
    () => {},
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 5000 }
  );
}

function onPos(lat, lon) {
  myLat = lat; myLon = lon;
  if (!markerA) {
    const el = document.createElement('div');
    el.style.cssText = 'width:14px;height:14px;background:#4CAF50;border:3px solid #fff;border-radius:50%;box-shadow:0 0 0 6px rgba(76,175,80,0.25)';
    markerA = new mapboxgl.Marker({ element: el }).setLngLat([lon, lat]).addTo(map);
    map.flyTo({ center: [lon, lat], zoom: 14 });
  } else {
    markerA.setLngLat([lon, lat]);
  }
  reverseGeocode(lat, lon).then(addr => {
    myAddress = addr;
    const el = document.getElementById('textA');
    el.textContent = addr;
    el.classList.add('set');
  });
  updateUI();
}

document.addEventListener('visibilitychange', () => {
  if (!document.hidden) initLocation();
});

// ── GEOCODING ──
async function reverseGeocode(lat, lon) {
  try {
    const r = await fetch(
      `https://api.mapbox.com/geocoding/v5/mapbox.places/${lon},${lat}.json` +
      `?access_token=${MAPBOX}&language=ru&limit=1`
    );
    const d = await r.json();
    return d.features?.[0]?.place_name || `${lat.toFixed(4)}, ${lon.toFixed(4)}`;
  } catch { return `${lat.toFixed(4)}, ${lon.toFixed(4)}`; }
}

// ── ЦЕНА: 1€/км, мин 8€ ──
function calcKm(lat1, lon1, lat2, lon2) {
  const R = 6371, dl = (lat2-lat1)*Math.PI/180, dg = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dl/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dg/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function getPrice() {
  if (!myLat || !destLat) return 0;
  return Math.max(8, Math.round(calcKm(myLat, myLon, destLat, destLon)));
}

function updateUI() {
  const ready = myLat !== null && destLat !== null;
  const btn = document.getElementById('orderBtn');
  if (ready) {
    const p = getPrice();
    document.getElementById('priceVal').textContent = p + '€';
    btn.textContent = `🚖 Заказать · ${p}€`;
    btn.disabled = false;
  } else {
    btn.disabled = true;
    btn.textContent = '🚖 Заказать такси';
  }
}

// ── ОПЛАТА ──
function setPay(type) {
  payment = type;
  document.getElementById('payCash').classList.toggle('sel', type === 'cash');
  document.getElementById('payCard').classList.toggle('sel', type === 'card');
}

// ── МОЯ ТОЧКА ──
function goToMe() {
  if (myLat) map.flyTo({ center: [myLon, myLat], zoom: 15, duration: 800 });
  else { showToast('Геолокация не получена'); initLocation(); }
}

// ── ЗАКАЗАТЬ ──
async function placeOrder() {
  if (!myLat || !destLat) return;
  const btn = document.getElementById('orderBtn');
  btn.disabled = true; btn.textContent = 'Отправляем...';
  const price = getPrice();
  try {
    const r = await fetch('/api/create_order', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        client_id:    CLIENT_ID,
        client_name:  CLIENT_NAME,
        from_address: myAddress,
        to_address:   destAddress,
        from_lat: myLat, from_lon: myLon,
        to_lat: destLat, to_lon: destLon,
        price:       price,
        driver_gets: price - 1,
        payment:     payment,
        time:        'Сейчас'
      })
    });
    const res = await r.json();
    if (res.ok) {
      orderId = res.order_id;
      showStatus('pending');
      pollTimer = setInterval(pollStatus, 3000);
    } else {
      showToast('❌ ' + (res.error || 'Ошибка'));
      btn.disabled = false; btn.textContent = `🚖 Заказать · ${price}€`;
    }
  } catch {
    showToast('❌ Ошибка сети');
    btn.disabled = false; btn.textContent = `🚖 Заказать · ${price}€`;
  }
}

// ── СТАТУС ──
const STATUS = {
  pending:   { icon:'⏳', title:'Ищем водителя...',    sub:'Обычно до 2 минут',            cancel:true  },
  accepted:  { icon:'🚖', title:'Водитель едет к вам!', sub:'Скоро будет у вас',            cancel:true  },
  arrived:   { icon:'📍', title:'Водитель прибыл!',     sub:'Выходите — он ждёт вас 🙂',   cancel:false },
  done:      { icon:'✅', title:'Поездка завершена',    sub:'Спасибо что выбрали TL.TAKSO!', cancel:false },
  cancelled: { icon:'❌', title:'Заказ отменён',        sub:'',                              cancel:false },
};

function showStatus(st) {
  document.getElementById('selectPanel').style.display = 'none';
  document.getElementById('statusPanel').style.display = 'block';
  const s = STATUS[st] || STATUS.pending;
  document.getElementById('stIcon').textContent  = s.icon;
  document.getElementById('stTitle').textContent = s.title;
  document.getElementById('stSub').textContent   = s.sub;
  document.getElementById('cancelBtn').style.display = s.cancel ? 'block' : 'none';
  if (st === 'done') setTimeout(() => tg.close(), 2500);
}

async function pollStatus() {
  if (!orderId) return;
  try {
    const r = await fetch(`/api/order_status/${orderId}`);
    if (!r.ok) return;
    const d = await r.json();
    if (!d.ok) return;
    showStatus(d.status);
    if (['done', 'cancelled'].includes(d.status)) {
      clearInterval(pollTimer); orderId = null;
    }
  } catch {}
}

// ── ОТМЕНА ──
async function cancelOrder() {
  if (!orderId) return;
  if (!confirm('Отменить заказ?')) return;
  try {
    await fetch(`/api/cancel_order_client/${orderId}`, { method: 'POST' });
    clearInterval(pollTimer); orderId = null;
    // Возвращаемся на карту — сбрасываем всё
    destLat = null; destLon = null;
    destAddress = '';
    if (markerB) { markerB.remove(); markerB = null; }
    document.getElementById('textB').textContent = 'Выберите на карте';
    document.getElementById('textB').classList.remove('set');
    document.getElementById('priceVal').textContent = '—';
    document.getElementById('statusPanel').style.display = 'none';
    document.getElementById('selectPanel').style.display = 'block';
    document.getElementById('orderBtn').disabled = true;
    document.getElementById('orderBtn').textContent = '🚖 Заказать такси';
    showToast('❌ Заказ отменён');
  } catch { showToast('❌ Ошибка'); }
}

// ── ТОСТ ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

initLocation();
</script>
</body>
</html>
