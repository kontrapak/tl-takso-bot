<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();
tg.enableClosingConfirmation();

const MAPBOX_TOKEN = "pk.eyJ1IjoidGx0YWtzbyIsImEiOiJjbW4zYW0yMGkxNG13MnByM2hoZng0OXh2In0.ArR_nk-dVg99VhuuatH2hA";

let state = { from:null, to:null, price:0, priceLabel:'', payment:'cash', pickingFor:null, myLat:null, myLon:null };

// ── КАРТА ──
mapboxgl.accessToken = MAPBOX_TOKEN;
const map = new mapboxgl.Map({ container:'map', style:'mapbox://styles/mapbox/dark-v11', center:[24.7536,59.4370], zoom:12 });

// ── ГЕОЛОКАЦИЯ ──
function updateMyPosition(lat, lon) { 
    state.myLat=lat; state.myLon=lon;
    if(!window._meMarker){ 
        const el=document.createElement('div'); 
        el.style.cssText='width:14px;height:14px;background:#4CAF50;border:3px solid #fff;border-radius:50%;box-shadow:0 0 10px rgba(76,175,80,0.8)'; 
        window._meMarker=new mapboxgl.Marker({element:el}).setLngLat([lon,lat]).addTo(map); 
    } else { 
        window._meMarker.setLngLat([lon,lat]); 
    } 
}

function goToMyLocation(){ 
    if(state.myLat&&state.myLon){ 
        map.flyTo({center:[state.myLon,state.myLat], zoom:15,duration:800}); 
    } else { 
        showToast('Геолокация ещё не получена...'); 
    } 
}

// ── ВЫБОР ТОЧКИ НА КАРТЕ ──
function openSearch(type){ 
    state.pickingFor=type; 
    startPickingOnMap(type);
}

function startPickingOnMap(type){ 
    document.getElementById('panel').classList.add('hidden'); 
    document.getElementById('center-marker').style.display='block'; 
    const btn=document.getElementById('confirm-point-btn'); 
    btn.textContent=type==='from'?'✅ Отсюда':'✅ Сюда'; 
    btn.style.display='block'; 
}

function closeSearch() {
    document.getElementById('panel').classList.remove('hidden');
    document.getElementById('center-marker').style.display='none';
    document.getElementById('confirm-point-btn').style.display='none';
    state.pickingFor=null;
}

async function confirmMapPoint(){ 
    const c=map.getCenter(); 
    const lat=c.lat, lon=c.lng; 
    const addr=`${lat.toFixed(5)}, ${lon.toFixed(5)}`; 
    if(state.pickingFor==='from'){ 
        state.from={lat,lon,address:addr}; 
        setFromUI(addr); 
    } else { 
        state.to={lat,lon,address:addr}; 
        setToUI(addr); 
    } 
    closeSearch();
    checkAddressesReady(); 
}

// ── UI ──
function setFromUI(address){ 
    document.getElementById('from-text').textContent=address; 
    document.getElementById('from-box').classList.add('filled'); 
    if(window._fromMarker) window._fromMarker.remove(); 
    window._fromMarker=new mapboxgl.Marker({color:'#4CAF50'}).setLngLat([state.from.lon,state.from.lat]).addTo(map);
}

function setToUI(address){ 
    document.getElementById('to-text').textContent=address; 
    document.getElementById('to-box').classList.add('filled'); 
    if(window._toMarker) window._toMarker.remove(); 
    window._toMarker=new mapboxgl.Marker({color:'#FFD700'}).setLngLat([state.to.lon,state.to.lat]).addTo(map);
}

function checkAddressesReady(){ 
    document.getElementById('next-to-tariff').disabled=!(state.from&&state.to); 
}

function goToTariff(){ 
    if(!state.from||!state.to) return; 
    document.getElementById('step-addresses').classList.remove('active'); 
    document.getElementById('step-tariff').classList.add('active'); 
    map.fitBounds([[state.from.lon,state.from.lat],[state.to.lon,state.to.lat]], {padding:60,duration:800}); 
}

function selectTariff(price,label,e){ 
    state.price=price; 
    state.priceLabel=label; 
    document.querySelectorAll('.tariff-btn').forEach(b=>b.classList.remove('selected')); 
    e.currentTarget.classList.add('selected'); 
    updateOrderBtn(); 
}

function selectPayment(type){ 
    state.payment=type; 
    document.getElementById('pay-cash').classList.toggle('selected',type==='cash'); 
    document.getElementById('pay-card').classList.toggle('selected',type==='card'); 
    updateOrderBtn(); 
}

function updateOrderBtn(){ 
    const btn=document.getElementById('confirm-order-btn'); 
    btn.disabled=!state.price; 
    btn.textContent=state.price?`Заказать такси · ${state.price}€`:'Заказать такси'; 
}

// ── ОТПРАВКА ДАННЫХ ──
function sendOrder(){ 
    if(!state.from||!state.to||!state.price){ 
        showToast('Заполните все поля'); 
        return; 
    }
    const payload={
        from_address:state.from.address,
        to_address:state.to.address,
        from_lat:state.from.lat,
        from_lon:state.from.lon,
        to_lat:state.to.lat,
        to_lon:state.to.lon,
        price:state.price,
        driver_gets:state.price-1,
        payment:state.payment,
        time:'Сейчас'
    };
    console.log('Payload:',payload);
    tg.sendData(JSON.stringify(payload));
    showToast('✅ Заказ отправлен!');
}

function showToast(msg){ 
    const el=document.getElementById('toast'); 
    el.textContent=msg; 
    el.classList.add('show'); 
    setTimeout(()=>el.classList.remove('show'),2500); 
}
</script>
