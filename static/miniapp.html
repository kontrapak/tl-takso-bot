<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TL.TAKSO — Заказ такси</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000000;
            color: #FFD700;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 2px solid #FFD700;
            margin-bottom: 25px;
        }
        
        .header h1 {
            font-size: 28px;
            letter-spacing: 2px;
        }
        
        .header p {
            color: #FFD700AA;
            font-size: 12px;
            margin-top: 5px;
        }
        
        .card {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #FFD70033;
        }
        
        .card-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #FFD700;
        }
        
        .location-btn {
            width: 100%;
            background: #FFD700;
            color: #000000;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 12px;
            transition: all 0.2s;
        }
        
        .location-btn:hover {
            background: #FFED4A;
            transform: scale(1.02);
        }
        
        .address-input {
            width: 100%;
            background: #2a2a2a;
            border: 1px solid #FFD70066;
            color: #FFD700;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 12px;
        }
        
        .address-input:focus {
            outline: none;
            border-color: #FFD700;
        }
        
        .price-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 15px 0;
        }
        
        .price-btn {
            background: #2a2a2a;
            border: 1px solid #FFD70066;
            color: #FFD700;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .price-btn.selected {
            background: #FFD700;
            color: #000000;
            border-color: #FFD700;
        }
        
        .payment-buttons {
            display: flex;
            gap: 12px;
            margin: 15px 0;
        }
        
        .payment-btn {
            flex: 1;
            background: #2a2a2a;
            border: 1px solid #FFD70066;
            color: #FFD700;
            padding: 14px;
            border-radius: 12px;
            font-size: 14px;
            cursor: pointer;
        }
        
        .payment-btn.selected {
            background: #FFD700;
            color: #000000;
        }
        
        .time-buttons {
            display: flex;
            gap: 12px;
            margin: 15px 0;
        }
        
        .time-btn {
            flex: 1;
            background: #2a2a2a;
            border: 1px solid #FFD70066;
            color: #FFD700;
            padding: 10px;
            border-radius: 12px;
            cursor: pointer;
        }
        
        .time-btn.selected {
            background: #FFD700;
            color: #000000;
        }
        
        .submit-btn {
            width: 100%;
            background: #FFD700;
            color: #000000;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #FFD70022;
        }
        
        .info-label {
            color: #FFD700AA;
        }
        
        .info-value {
            font-weight: bold;
            color: #FFD700;
        }
        
        .success {
            background: #1a3a1a;
            border-color: #00ff00;
            text-align: center;
            padding: 30px;
            border-radius: 16px;
        }
        
        .success-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- Шаг 1: Откуда -->
        <div id="step1">
            <div class="header">
                <h1>🚖 TL.TAKSO</h1>
                <p>Жёлто-чёрное такси Таллинна</p>
            </div>
            <div class="card">
                <div class="card-title">📍 Откуда едем?</div>
                <button class="location-btn" onclick="getCurrentLocation('from')">
                    📍 Моё местоположение
                </button>
                <input type="text" id="fromAddress" class="address-input" placeholder="Или введите адрес вручную...">
                <button class="submit-btn" onclick="nextStep('from')">Далее →</button>
            </div>
        </div>
        
        <!-- Шаг 2: Куда -->
        <div id="step2" class="hidden">
            <div class="header">
                <h1>🚖 TL.TAKSO</h1>
                <p>Куда направляемся?</p>
            </div>
            <div class="card">
                <div class="card-title">🏁 Куда едем?</div>
                <button class="location-btn" onclick="getCurrentLocation('to')">
                    📍 Выбрать на карте
                </button>
                <input type="text" id="toAddress" class="address-input" placeholder="Или введите адрес вручную...">
                <button class="submit-btn" onclick="nextStep('to')">Далее →</button>
            </div>
        </div>
        
        <!-- Шаг 3: Время, тариф, оплата -->
        <div id="step3" class="hidden">
            <div class="header">
                <h1>🚖 TL.TAKSO</h1>
                <p>Детали поездки</p>
            </div>
            <div class="card">
                <div class="card-title">⏰ Когда нужна машина?</div>
                <div class="time-buttons">
                    <button class="time-btn" onclick="selectTime('now')">⚡ Сейчас</button>
                    <button class="time-btn" onclick="selectTime('15')">⏱ +15 мин</button>
                    <button class="time-btn" onclick="selectTime('30')">⏱ +30 мин</button>
                </div>
                
                <div class="card-title" style="margin-top: 20px;">💰 Выберите тариф</div>
                <div class="price-buttons">
                    <button class="price-btn" onclick="selectPrice(8)">8€ — Mustamäe</button>
                    <button class="price-btn" onclick="selectPrice(10)">10€ — Город</button>
                    <button class="price-btn" onclick="selectPrice(15)">15€ — Далеко</button>
                    <button class="price-btn" onclick="selectPrice(20)">20€ — Аэропорт</button>
                </div>
                
                <div class="card-title" style="margin-top: 20px;">💳 Способ оплаты</div>
                <div class="payment-buttons">
                    <button class="payment-btn" onclick="selectPayment('card')">💳 Карта</button>
                    <button class="payment-btn" onclick="selectPayment('cash')">💵 Наличные</button>
                </div>
                
                <div class="info-row" style="margin-top: 20px;">
                    <span class="info-label">Итого:</span>
                    <span class="info-value" id="totalPrice">0€</span>
                </div>
                
                <button class="submit-btn" onclick="createOrder()">✅ Заказать такси</button>
            </div>
        </div>
        
        <!-- Шаг 4: Успех -->
        <div id="step4" class="hidden">
            <div class="success">
                <div class="success-icon">✅</div>
                <h2>Заказ создан!</h2>
                <p>Водитель скоро прибудет</p>
                <button class="submit-btn" onclick="closeApp()" style="margin-top: 20px;">Закрыть</button>
            </div>
        </div>
    </div>
    
    <script>
        let orderData = {
            from_lat: null,
            from_lon: null,
            from_address: null,
            to_lat: null,
            to_lon: null,
            to_address: null,
            time: 'now',
            price: 0,
            payment: 'card'
        };
        
        function getCurrentLocation(type) {
            if ('geolocation' in navigator) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        
                        if (type === 'from') {
                            orderData.from_lat = lat;
                            orderData.from_lon = lon;
                            orderData.from_address = `${lat.toFixed(5)}, ${lon.toFixed(5)}`;
                            document.getElementById('fromAddress').value = orderData.from_address;
                        } else {
                            orderData.to_lat = lat;
                            orderData.to_lon = lon;
                            orderData.to_address = `${lat.toFixed(5)}, ${lon.toFixed(5)}`;
                            document.getElementById('toAddress').value = orderData.to_address;
                        }
                    },
                    (error) => {
                        alert('Не удалось получить геолокацию. Введите адрес вручную.');
                    }
                );
            } else {
                alert('Геолокация не поддерживается');
            }
        }
        
        function nextStep(step) {
            if (step === 'from') {
                const address = document.getElementById('fromAddress').value;
                if (!address) {
                    alert('Введите адрес отправления');
                    return;
                }
                orderData.from_address = address;
                document.getElementById('step1').classList.add('hidden');
                document.getElementById('step2').classList.remove('hidden');
            } else if (step === 'to') {
                const address = document.getElementById('toAddress').value;
                if (!address) {
                    alert('Введите адрес назначения');
                    return;
                }
                orderData.to_address = address;
                document.getElementById('step2').classList.add('hidden');
                document.getElementById('step3').classList.remove('hidden');
            }
        }
        
        function selectTime(time) {
            orderData.time = time;
            document.querySelectorAll('.time-btn').forEach(btn => btn.classList.remove('selected'));
            event.target.classList.add('selected');
        }
        
        function selectPrice(price) {
            orderData.price = price;
            document.querySelectorAll('.price-btn').forEach(btn => btn.classList.remove('selected'));
            event.target.classList.add('selected');
            document.getElementById('totalPrice').innerText = price + '€';
        }
        
        function selectPayment(payment) {
            orderData.payment = payment;
            document.querySelectorAll('.payment-btn').forEach(btn => btn.classList.remove('selected'));
            event.target.classList.add('selected');
        }
        
        function createOrder() {
            if (!orderData.price) {
                alert('Выберите тариф');
                return;
            }
            
            const driverGets = orderData.payment === 'cash' ? orderData.price - 1 : orderData.price;
            
            const data = {
                from_address: orderData.from_address,
                to_address: orderData.to_address,
                from_lat: orderData.from_lat || 0,
                from_lon: orderData.from_lon || 0,
                to_lat: orderData.to_lat || 0,
                to_lon: orderData.to_lon || 0,
                time: orderData.time === 'now' ? 'Сейчас' : orderData.time === '15' ? 'Через 15 мин' : 'Через 30 мин',
                payment: orderData.payment,
                price: orderData.price,
                driver_gets: driverGets
            };
            
            // Отправляем данные в Telegram
            Telegram.WebApp.sendData(JSON.stringify(data));
            
            document.getElementById('step3').classList.add('hidden');
            document.getElementById('step4').classList.remove('hidden');
            
            setTimeout(() => {
                Telegram.WebApp.close();
            }, 2000);
        }
        
        function closeApp() {
            Telegram.WebApp.close();
        }
        
        // Инициализация Telegram WebApp
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
        Telegram.WebApp.setHeaderColor('#000000');
        Telegram.WebApp.setBackgroundColor('#000000');
    </script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</body>
</html>
