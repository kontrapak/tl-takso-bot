
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TL.TAKSO</title>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:sans-serif; background:#121212; color:#fff; height:100dvh; overflow:hidden; }
#map { position:absolute; inset:0; }

/* ── ПАНЕЛЬ ЗАКАЗА ── */
.panel {
  position:absolute; bottom:0; left:0; right:0;
  background:#1a1a1a; border-radius:20px 20px 0 0;
  border-top:2px solid #2a2a2a;
  padding:14px 14px 20px; z-index:10;
}

/* Поля ввода */
.input-wrap {
  position:relative; margin-bottom:8px;
}
.addr-input {
  width:100%; padding:12px 14px 12px 36px;
  background:#111; border:1px solid #2a2a2a; border-radius:12px;
  color:#fff; font-size:14px; outline:none;
}
.addr-input:focus { border-color:#FFD600; }
.addr-input::placeholder { color:#555; }
.input-icon {
  position:absolute; left:12px; top:50%; transform:translateY(-50%);
  font-size:14px; pointer-events:none;
}
/* Подсказки */
.suggestions {
  position:absolute; left:0; right:0; top:100%;
  background:#1e1e1e; border:1px solid #333; border-radius:0 0 12px 12px;
  z-index:50; max-height:180px; overflow-y:auto; display:none;
}
.suggestions.open { display:block; }
.sug-item {
  padding:11px 14px; font-size:13px; color:#ccc; cursor:pointer;
  border-bottom:1px solid #222;
}
.sug-item:last-child { border-bottom:none; }
.sug-item:active, .sug-item:hover { background:#2a2a2a; color:#fff; }
.sug-name { color:#fff; font-weight:600; }
.sug-sub  { font-size:11px; color:#666; margin-top:1px; }

/* Моя геолокация — кнопка */
.my-loc-btn {
  display:flex; align-items:center; gap:8px;
  padding:8px 0 10px; font-size:13px; color:#FFD600;
  cursor:pointer; background:none; border:none; width:100%;
}

/* Цена и оплата */
.price-row {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:10px;
}
.price-label { font-size:13px; color:#666; }
.price-val { font-size:26px; font-weight:700; color:#FFD600; }

.pay-row { display:flex; gap:8px; margin-bottom:12px; }
.pay-btn {
  flex:1; padding:10px; background:#111; border:1px solid #2a2a2a;
  border-radius:10px; text-align:center; font-size:13px; cursor:pointer; color:#888;
}
.pay-btn.sel { border-color:#FFD600; background:#1f1a00; color:#FFD600; }

.order-btn {
  width:100%; padding:15px; background:#FFD600; color:#000;
  border:none; border-radius:14px; font-size:17px; font-weight:700; cursor:pointer;
}
.order-btn:disabled { background:#333; color:#555; cursor:default; }

/* ── ПАНЕЛЬ СТАТУСА ── */
#statusPanel { display:none; }
.st-icon  { font-size:44px; text-align:center; margin-bottom:8px; }
.st-title { font-size:17px; font-weight:700; text-align:center; margin-bottom:4px; }
.st-sub   { font-size:13px; color:#888; text-align:center; margin-bottom:14px; }
.cancel-btn {
  width:100%; padding:12px; background:transparent; color:#FF3B30;
  border:1px solid #FF3B30; border-radius:12px; font-size:14px; font-weight:700; cursor:pointer;
}

/* Кнопка геолокации на карте */
#locBtn {
  position:absolute; right:14px; bottom:280px; z-index:10;
  width:44px; height:44px; background:#1a1a1a; border:1px solid #333;
  border-radius:12px; display:flex; align-items:center; justify-content:center;
  font-size:22px; cursor:pointer;
}

#toast {
  position:fixed; top:16px; left:50%; transform:translateX(-50%);
  background:#FFD600; color:#000; padding:10px 20px; border-radius:30px;
  font-weight:700; font-size:14px; z-index:200;
  opacity:0; transition:opacity 0.3s; pointer-events:none; white-space:nowrap;
}
#toast.show { opacity:1; }

.mapboxgl-ctrl-logo,.mapboxgl-ctrl-attrib,.mapboxgl-ctrl-group { display:none !important; }
</style>
</head>
<body>

<div id="map"></div>
<div id="locBtn" onclick="goToMe()">📡</div>
<div id="toast"></div>

<!-- ПАНЕЛЬ ЗАКАЗА -->
<div class="panel" id="orderPanel">

  <div class="input-wrap" id="wrapFrom">
    <span class="input-icon">🟢</span>
    <input class="addr-input" id="fromInput" placeholder="Откуда забрать?" autocomplete="off"
      oninput="onAddrInput('from')" onfocus="onFocus('from')" onblur="onBlur('from')">
    <div class="suggestions" id="sugFrom"></div>
  </div>

  <button class="my-loc-btn" onclick="useMyLocation()">
    📡 Использовать мою геолокацию
  </button>

  <div class="input-wrap" id="wrapTo">
    <span class="input-icon">🔴</span>
    <input class="addr-input" id="toInput" placeholder="Куда едем?" autocomplete="off"
      oninput="onAddrInput('to')" onfocus="onFocus('to')" onblur="onBlur('to')">
    <div class="suggestions" id="sugTo"></div>
  </div>

  <div class="price-row" style="margin-top:10px">
    <div class="price-label">Стоимость</div>
    <div class="price-val" id="priceVal">—</div>
  </div>

  <div class="pay-row">
    <div class="pay-btn sel" id="payCash" onclick="setPay('cash')">💵 Наличные</div>
    <div class="pay-btn"    id="payCard" onclick="setPay('card')">💳 Карта</div>
  </div>

  <button class="order-btn" id="orderBtn" disabled onclick="placeOrder()">🚖 Заказать такси</button>
</div>

<!-- ПАНЕЛЬ СТАТУСА -->
<div class="panel" id="statusPanel">
  <div class="st-icon"  id="stIcon">⏳</div>
  <div class="st-title" id="stTitle">Ищем водителя...</div>
  <div class="st-sub"   id="stSub">Обычно до 2 минут</div>
  <button class="cancel-btn" id="cancelBtn" onclick="cancelOrder()">❌ Отменить заказ</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready(); tg.expand();

const MAPBOX     = 'pk.eyJ1IjoidGx0YWtzbyIsImEiOiJjbW4zYW0yMGkxNG13MnByM2hoZng0OXh2In0.ArR_nk-dVg99VhuuatH2hA';
const CLIENT_ID  = tg.initDataUnsafe?.user?.id;
const CLIENT_NAME = tg.initDataUnsafe?.user?.first_name || 'Клиент';

mapboxgl.accessToken = MAPBOX;

let myLat = null, myLon = null;
let from = null;
let to   = null;
let payment = 'cash';
let orderId = null;
let pollTimer = null;
let markerFrom = null, markerTo = null, markerMe = null;
let taxiMarker = null;
let sugTimers = { from: null, to: null };

const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/dark-v11',
  center: [24.7536, 59.4370], zoom: 13,
  attributionControl: false
});

function initLocation() {
  if (tg.LocationManager && typeof tg.LocationManager.init === 'function') {
    tg.LocationManager.init(() => {
      if (tg.LocationManager.isLocationAvailable)
        tg.LocationManager.getLocation(loc => { if (loc) onPos(loc.latitude, loc.longitude); else startBrowserGeo(); });
      else startBrowserGeo();
    });
  } else startBrowserGeo();
}

function startBrowserGeo() {
  if (!navigator.geolocation) return;
  navigator.geolocation.watchPosition(
    p => onPos(p.coords.latitude, p.coords.longitude),
    () => {}, { enableHighAccuracy:true, timeout:15000, maximumAge:5000 }
  );
}

function onPos(lat, lon) {
  myLat = lat; myLon = lon;
  if (!markerMe) {
    const el = document.createElement('div');
    el.style.cssText = 'width:14px;height:14px;background:#4CAF50;border:3px solid #fff;border-radius:50%;box-shadow:0 0 0 6px rgba(76,175,80,0.2)';
    markerMe = new mapboxgl.Marker({ element: el }).setLngLat([lon, lat]).addTo(map);
    map.flyTo({ center: [lon, lat], zoom: 14 });
  } else { markerMe.setLngLat([lon, lat]); }
}

document.addEventListener('visibilitychange', () => { if (!document.hidden) initLocation(); });

function goToMe() {
  if (myLat) map.flyTo({ center: [myLon, myLat], zoom: 15, duration: 800 });
  else { showToast('Геолокация не получена'); initLocation(); }
}

function useMyLocation() {
  if (!myLat) { showToast('Геолокация ещё не получена...'); return; }
  reverseGeocode(myLat, myLon).then(addr => {
    from = { lat: myLat, lon: myLon, address: addr };
    document.getElementById('fromInput').value = addr;
    setMarker('from', myLon, myLat);
    updatePriceAndBtn();
  });
}

async function geocode(query) {
  const url = `https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(query)}.json`
    + `?access_token=${MAPBOX}&country=ee&language=ru&limit=5&proximity=24.7536,59.4370`;
  const r = await fetch(url);
  const d = await r.json();
  return d.features || [];
}

async function reverseGeocode(lat, lon) {
  try {
    const r = await fetch(`https://api.mapbox.com/geocoding/v5/mapbox.places/${lon},${lat}.json?access_token=${MAPBOX}&language=ru&limit=1`);
    const d = await r.json();
    return d.features?.[0]?.place_name || `${lat.toFixed(4)}, ${lon.toFixed(4)}`;
  } catch { return `${lat.toFixed(4)}, ${lon.toFixed(4)}`; }
}

function onAddrInput(type) {
  const val = document.getElementById(type === 'from' ? 'fromInput' : 'toInput').value.trim();
  clearTimeout(sugTimers[type]);
  if (val.length < 2) { closeSug(type); return; }
  sugTimers[type] = setTimeout(async () => {
    const features = await geocode(val);
    showSuggestions(type, features);
  }, 350);
}

function showSuggestions(type, features) {
  const el = document.getElementById(type === 'from' ? 'sugFrom' : 'sugTo');
  el.innerHTML = '';
  if (!features.length) { el.classList.remove('open'); return; }
  features.forEach(f => {
    const item = document.createElement('div');
    item.className = 'sug-item';
    const name = f.text || f.place_name.split(',')[0];
    const sub  = f.place_name;
    item.innerHTML = `<div class="sug-name">${name}</div><div class="sug-sub">${sub}</div>`;
    item.onmousedown = () => selectSuggestion(type, f);
    el.appendChild(item);
  });
  el.classList.add('open');
}

function selectSuggestion(type, feature) {
  const [lon, lat] = feature.geometry.coordinates;
  const addr = feature.place_name;
  if (type === 'from') {
    from = { lat, lon, address: addr };
    document.getElementById('fromInput').value = addr;
    setMarker('from', lon, lat);
  } else {
    to = { lat, lon, address: addr };
    document.getElementById('toInput').value = addr;
    setMarker('to', lon, lat);
  }
  closeSug(type);
  fitBounds();
  updatePriceAndBtn();
}

function onFocus(type) {
  const val = document.getElementById(type === 'from' ? 'fromInput' : 'toInput').value.trim();
  if (val.length >= 2) onAddrInput(type);
}

function onBlur(type) {
  setTimeout(() => closeSug(type), 200);
}

function closeSug(type) {
  document.getElementById(type === 'from' ? 'sugFrom' : 'sugTo').classList.remove('open');
}

function setMarker(type, lon, lat) {
  if (type === 'from') {
    if (markerFrom) markerFrom.remove();
    markerFrom = new mapboxgl.Marker({ color: '#4CAF50' }).setLngLat([lon, lat]).addTo(map);
  } else {
    if (markerTo) markerTo.remove();
    markerTo = new mapboxgl.Marker({ color: '#FF3B30' }).setLngLat([lon, lat]).addTo(map);
  }
}

function fitBounds() {
  if (!from || !to) return;
  const b = new mapboxgl.LngLatBounds();
  b.extend([from.lon, from.lat]);
  b.extend([to.lon, to.lat]);
  map.fitBounds(b, { padding: 80, duration: 600 });
}

function calcKm(lat1, lon1, lat2, lon2) {
  const R = 6371, dl = (lat2-lat1)*Math.PI/180, dg = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dl/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dg/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function getPrice() {
  if (!from || !to) return 0;
  return Math.max(8, Math.round(calcKm(from.lat, from.lon, to.lat, to.lon)));
}

function updatePriceAndBtn() {
  const ready = from && to;
  const btn = document.getElementById('orderBtn');
  if (ready) {
    const p = getPrice();
    document.getElementById('priceVal').textContent = p + '€';
    btn.textContent = `🚖 Заказать · ${p}€`;
    btn.disabled = false;
  } else {
    document.getElementById('priceVal').textContent = '—';
    btn.textContent = '🚖 Заказать такси';
    btn.disabled = true;
  }
}

function setPay(type) {
  payment = type;
  document.getElementById('payCash').classList.toggle('sel', type === 'cash');
  document.getElementById('payCard').classList.toggle('sel', type === 'card');
}

async function placeOrder() {
  if (!from || !to) return;
  const btn = document.getElementById('orderBtn');
  btn.disabled = true; btn.textContent = 'Отправляем...';
  const price = getPrice();
  try {
    const r = await fetch('/api/create_order', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        client_id:    CLIENT_ID,
        client_name:  CLIENT_NAME,
        from_address: from.address,
        to_address:   to.address,
        from_lat: from.lat, from_lon: from.lon,
        to_lat:   to.lat,   to_lon:   to.lon,
        price,
        driver_gets: price - 1,
        payment,
        time: 'Сейчас'
      })
    });
    const res = await r.json();
    if (res.ok) {
      orderId = res.order_id;
      showStatus('pending');
      pollTimer = setInterval(pollStatus, 3000);
    } else {
      showToast('❌ ' + (res.error || 'Ошибка'));
      btn.disabled = false; btn.textContent = `🚖 Заказать · ${price}€`;
    }
  } catch {
    showToast('❌ Ошибка сети');
    btn.disabled = false; btn.textContent = `🚖 Заказать · ${price}€`;
  }
}

const STATUS_MAP = {
  pending:   { icon:'⏳', title:'Ищем водителя...',     sub:'Обычно до 2 минут',             cancel:true  },
  accepted:  { icon:'🚖', title:'Водитель едет к вам!', sub:'Скоро будет у вас',             cancel:true  },
  arrived:   { icon:'📍', title:'Водитель прибыл!',     sub:'Выходите — он ждёт вас 🙂',    cancel:false },
  done:      { icon:'✅', title:'Поездка завершена',    sub:'Спасибо что выбрали TL.TAKSO!', cancel:false },
  cancelled: { icon:'❌', title:'Заказ отменён',        sub:'',                              cancel:false },
};

function showStatus(st) {
  document.getElementById('orderPanel').style.display = 'none';
  document.getElementById('statusPanel').style.display = 'block';
  const s = STATUS_MAP[st] || STATUS_MAP.pending;
  document.getElementById('stIcon').textContent  = s.icon;
  document.getElementById('stTitle').textContent = s.title;
  document.getElementById('stSub').textContent   = s.sub;
  document.getElementById('cancelBtn').style.display = s.cancel ? 'block' : 'none';
}

// ── ОПРОС СТАТУСА ЗАКАЗА ──
async function pollStatus() {
  if (!orderId) return;
  try {
    const res = await fetch(`/api/order_status/${orderId}`);
    const data = await res.json();
    if (!data.ok) return;
    showStatus(data.status);

    // Маркер водителя на карте
    if (data.driver_lat && data.driver_lon) {
      if (taxiMarker) { taxiMarker.remove(); taxiMarker = null; }
      const el = document.createElement('div');
      el.style.cssText = 'width:28px;height:28px;background:#FFD600;border:3px solid #fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 2px 8px rgba(0,0,0,0.5)';
      el.textContent = '🚖';
      taxiMarker = new mapboxgl.Marker({ element: el })
        .setLngLat([data.driver_lon, data.driver_lat]).addTo(map);
    }

    if (data.status === 'done' || data.status === 'cancelled') {
      clearInterval(pollTimer);
      pollTimer = null;
      orderId = null;
      setTimeout(() => location.reload(), 3000);
    }
  } catch(e) { console.error(e); }
}


// ── ОТМЕНА ЗАКАЗА (КЛИЕНТ) ──
async function cancelOrder() {
  if (!orderId) {
    showToast('❌ Нет активного заказа');
    document.getElementById('statusPanel').style.display = 'none';
    document.getElementById('orderPanel').style.display = 'block';
    if (pollTimer) clearInterval(pollTimer);
    return;
  }

  if (!confirm('Отменить заказ?')) return;

  try {
    const res = await fetch(`/api/cancel_order_client/${orderId}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({})
    });

    const data = await res.json();

    if (data.ok) {
      showToast('❌ Заказ отменён');
    } else {
      showToast('❌ ' + (data.error || 'Ошибка отмены'));
    }
  } catch(e) {
    showToast('❌ Ошибка сети');
    console.error(e);
  }

  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  orderId = null;
  if (taxiMarker) { taxiMarker.remove(); taxiMarker = null; }
  document.getElementById('statusPanel').style.display = 'none';
  document.getElementById('orderPanel').style.display = 'block';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

async function checkActiveOrder() {
  if (!CLIENT_ID) return false;
  try {
    const res = await fetch(`/api/active_order?user_id=${CLIENT_ID}`);
    const data = await res.json();
    if (data.ok && data.order_id) {
      orderId = data.order_id;
      showStatus(data.status);
      if (pollTimer) clearInterval(pollTimer);
      pollTimer = setInterval(pollStatus, 3000);
      return true;
    }
  } catch(e) { console.error(e); }
  return false;
}

initLocation();
checkActiveOrder().then(hasActive => {
  if (!hasActive) {
    document.getElementById('statusPanel').style.display = 'none';
    document.getElementById('orderPanel').style.display = 'block';
  }
});
</script>
</body>
</html>
