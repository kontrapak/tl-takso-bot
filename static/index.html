<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TL.TAKSO</title>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --yellow: #FFD600;
  --black: #0A0A0A;
  --dark: #111111;
  --border: #2A2A2A;
  --muted: #888888;
}
body {
  background: var(--black);
  color: #fff;
  font-family: 'Inter', sans-serif;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px 10px;
  border-bottom: 1px solid var(--border);
}
.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px;
  letter-spacing: 3px;
  color: var(--yellow);
}
.logo span { color: #fff; }
.status-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,214,0,0.1);
  border: 1px solid rgba(255,214,0,0.3);
  border-radius: 20px;
  padding: 5px 12px;
  font-size: 12px;
  font-weight: 600;
  color: var(--yellow);
}
.status-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--yellow);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%,100% { opacity:1; transform:scale(1); }
  50% { opacity:0.5; transform:scale(0.8); }
}
#map { flex: 1; width: 100%; position: relative; }
.legend {
  position: absolute;
  top: 12px; left: 12px; z-index: 5;
  background: rgba(10,10,10,0.85);
  backdrop-filter: blur(10px);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 14px;
  display: flex; flex-direction: column; gap: 6px;
}
.legend-title { font-size: 9px; font-weight: 700; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 2px; }
.legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.legend-price { color: var(--yellow); font-weight: 700; margin-left: auto; padding-left: 10px; }
.locate-btn {
  position: absolute; top: 12px; right: 12px; z-index: 5;
  width: 42px; height: 42px;
  background: rgba(10,10,10,0.9);
  border: 1px solid var(--border);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--yellow); font-size: 20px;
}
.locate-btn:active { transform: scale(0.93); background: var(--yellow); color: var(--black); }
.bottom-panel {
  background: var(--dark);
  border-top: 1px solid var(--border);
  padding: 16px 18px 24px;
}
.zone-info { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.zone-label { font-size: 13px; color: var(--muted); }
.zone-name { font-size: 16px; font-weight: 700; margin-top: 2px; }
.zone-price { font-family: 'Bebas Neue', sans-serif; font-size: 42px; color: var(--yellow); line-height: 1; }
.zone-price span { font-size: 20px; color: var(--muted); }
.order-btn {
  width: 100%; height: 56px;
  background: var(--yellow); color: var(--black);
  border: none; border-radius: 14px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px; letter-spacing: 3px;
  cursor: pointer; transition: transform 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.order-btn:active { transform: scale(0.97); }
.order-btn.loading { background: #333; color: var(--yellow); pointer-events: none; }
.mapboxgl-ctrl-logo, .mapboxgl-ctrl-attrib, .mapboxgl-ctrl-group { display: none !important; }
.toast {
  position: fixed; top: 80px; left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: var(--yellow); color: var(--black);
  padding: 10px 20px; border-radius: 30px;
  font-weight: 700; font-size: 14px;
  z-index: 100; opacity: 0; transition: all 0.3s;
  pointer-events: none; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.user-marker { width: 16px; height: 16px; background: var(--yellow); border: 3px solid white; border-radius: 50%; }
</style>
</head>

  <body>
<div class="header">
  <div class="logo">TL<span>.</span>TAKSO</div>
  <div class="status-badge">
    <div class="status-dot"></div>
    ОНЛАЙН
  </div>
</div>

<div id="map">
  <div class="legend">
    <div class="legend-title">Тарифы</div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#FFD600"></div>
      Мустамяэ
      <div class="legend-price">8€</div>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#FF9500"></div>
      По городу
      <div class="legend-price">10€</div>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#FF3B30"></div>
      Далеко
      <div class="legend-price">15€</div>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#AF52DE"></div>
      Аэропорт
      <div class="legend-price">20€</div>
    </div>
  </div>
  <div class="locate-btn" onclick="locateUser()">⊕</div>
</div>

<div class="bottom-panel">
  <div class="zone-info">
    <div>
      <div class="zone-label">Выбранная зона</div>
      <div class="zone-name" id="zoneName">Нажмите на карту</div>
    </div>
    <div class="zone-price" id="zonePrice">—</div>
  </div>
  <button class="order-btn" id="orderBtn" onclick="orderTaxi()">
    🚖 ВЫЗВАТЬ ТАКСИ
  </button>
</div>

<div class="toast" id="toast"></div>
