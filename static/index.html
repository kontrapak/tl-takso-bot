<!DOCTYPE html>
<html>
<head>
    <title>TL.TAKSO</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <h1>🚖 Заказ такси</h1>
    <input id="from" placeholder="Откуда" style="padding:10px;margin:5px;width:90%">
    <input id="to" placeholder="Куда" style="padding:10px;margin:5px;width:90%">
    <button onclick="sendOrder()" style="padding:12px;margin:10px;background:#FFD600;border:none;border-radius:8px">Заказать</button>
    
    <script>
        let tg = Telegram.WebApp;
        tg.ready();
        
        function sendOrder() {
            let data = {
                from: document.getElementById('from').value,
                to: document.getElementById('to').value,
                price: "10"
            };
            tg.sendData(JSON.stringify(data));
            tg.close();
        }
    </script>
</body>
</html>
