<!DOCTYPE html>
<html>
<head>
    <title>TL.TAKSO - Заказ такси</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{background:#0a0a0a;color:#fff;font-family:monospace;padding:20px}
        button{background:#FFD600;color:#000;padding:12px 24px;border:none;border-radius:8px;cursor:pointer;font-size:16px}
        input{padding:10px;margin:5px;background:#333;border:none;color:#fff;border-radius:8px;width:200px}
        .zone{display:inline-block;margin:5px;padding:10px;background:#FFD60020;border:1px solid #FFD600;border-radius:8px;cursor:pointer}
        .zone.active{background:#FFD600;color:#000}
        .result{margin-top:20px;padding:10px;background:#333;border-radius:8px}
    </style>
</head>
<body>
    <h1>🚖 TL.TAKSO - Заказ такси</h1>
    
    <h3>Выберите тариф:</h3>
    <div id="zones">
        <div class="zone" data-price="8" onclick="selectZone(this)">Мустамяэ 8€</div>
        <div class="zone" data-price="10" onclick="selectZone(this)">Город 10€</div>
        <div class="zone" data-price="15" onclick="selectZone(this)">Далеко 15€</div>
        <div class="zone" data-price="20" onclick="selectZone(this)">Аэропорт 20€</div>
    </div>
    
    <h3>Адреса:</h3>
    <div>
        <input id="from" placeholder="Откуда...">
        <input id="to" placeholder="Куда...">
    </div>
    
    <button onclick="createOrder()" style="margin-top:20px">🚖 ЗАКАЗАТЬ ТАКСИ</button>
    
    <div class="result" id="result"></div>

    <script>
        let selectedPrice = null;
        
        function selectZone(el) {
            document.querySelectorAll('.zone').forEach(z => z.classList.remove('active'));
            el.classList.add('active');
            selectedPrice = el.dataset.price;
        }
        
        async function createOrder() {
            if (!selectedPrice) {
                alert('Выберите тариф');
                return;
            }
            
            const from = document.getElementById('from').value;
            const to = document.getElementById('to').value;
            
            if (!from || !to) {
                alert('Введите адрес отправления и назначения');
                return;
            }
            
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '⏳ Отправка заказа...';
            
            try {
                const res = await fetch('/api/orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ from, to, price: selectedPrice })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    resultDiv.innerHTML = `✅ Заказ #${data.orderId} отправлен! Ожидайте водителя.`;
                    resultDiv.style.background = '#2a2a2a';
                } else {
                    resultDiv.innerHTML = `❌ Ошибка: ${data.error}`;
                    resultDiv.style.background = '#ff444420';
                }
            } catch (e) {
                resultDiv.innerHTML = '❌ Ошибка подключения к серверу';
                resultDiv.style.background = '#ff444420';
            }
        }
    </script>
</body>
</html>
