    <div class="order-route">

        <div class="route-info">
          <div class="route-label">ОТКУДА</div>

        </div>
      </div>
      <div class="route-item">

    </div>
    <button class="btn-arrived" id="btnArrived" onclick="markArrived()">📍 Я ПРИБЫЛ!</button>
    <button class="btn-done" id="btnDone" onclick="completeOrder()">✅ ПОЕЗДКА ЗАВЕРШЕНА</button>
    <button class="btn-cancel-order" onclick="cancelActiveOrder()">❌ Отменить заказ</button>

  </div>
  <div class="stat-block">
    <div class="stat-label">СТАТУС</div>
    <div class="stat-value" id="statStatus" style="font-size:14px;padding-top:4px">🟢</div>

const TALLINN = [24.7536, 59.4370];

let isOnline = true;
let currentOrder = null;

const map = new mapboxgl.Map({

// ── UI ──
function updateUI() {
  document.getElementById('balanceVal').textContent = balance + '€';
  document.getElementById('tripsVal').textContent = trips;
  document.getElementById('earnVal').textContent = earned + '€';
}
updateUI();

function toggleStatus() {
  isOnline = !isOnline;
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  const btn = document.getElementById('toggleBtn');
  const stat = document.getElementById('statStatus');
  if (isOnline) {
    dot.className = 'status-dot';
    text.textContent = 'Онлайн — жду заказ';
    btn.className = 'toggle';
    stat.textContent = '🟢';
    document.getElementById('noOrders').style.display = 'block';
    showToast('🟢 Вы онлайн');
    startPolling();
  } else {
    dot.className = 'status-dot offline';
    text.textContent = 'Офлайн';
    btn.className = 'toggle off';
    stat.textContent = '🔴';
    hideNewOrder();
    document.getElementById('noOrders').innerHTML = '<div class="no-orders-icon">⛔</div><div class="no-orders-text">Вы офлайн</div>';
    showToast('🔴 Вы офлайн');
  }
}

function hideActiveOrder() {
  activeOrderId = null;
  currentOrder = null;
  document.getElementById('activeOrderPanel').classList.remove('show');
  document.getElementById('statusText').textContent = 'Онлайн — жду заказ';
  if (isOnline) {
    document.getElementById('noOrders').innerHTML = '<div class="no-orders-icon">🚕</div><div class="no-orders-text">Ждём заказов...</div>';
    document.getElementById('noOrders').style.display = 'block';

// ── ПРИЕМ/ОТКАЗ ──
async function acceptOrder() { /* оставляем как есть */ }

async function completeOrder() { /* оставляем как есть */ }
async function cancelActiveOrder() { /* оставляем как есть */ }

// ── POLLING ──
async function pollOrders() {
  if (!isOnline) return;
  try {
    const res = await fetch('/api/orders');
    if (!res.ok) { console.error('Ошибка API /orders', res.status); return; }
    const orders = await res.json();
    console.log('Orders fetched:', orders);
    if (orders.length > 0 && !currentOrder) {
      showNewOrder(orders[0]);
    }
  } catch(e) {
    console.error('pollOrders exception', e);
  }
}

let pollInterval;
function startPolling() {
  clearInterval(pollInterval);
  pollInterval = setInterval(pollOrders, 4000);
  pollOrders();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

startPolling();
