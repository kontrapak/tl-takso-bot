<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Водитель Такси</title>
<link href="https://api.mapbox.com/mapbox-gl-js/v2.20.0/mapbox-gl.css" rel="stylesheet">
<style>
body { margin:0; font-family:sans-serif; background:#121212; color:#fff; }
#map { position:absolute; top:0; bottom:0; width:100%; }
#ui { position:absolute; top:10px; left:10px; z-index:2; }
.status-dot { display:inline-block; width:12px; height:12px; border-radius:50%; background:#4CAF50; margin-right:5px; }
.status-dot.offline { background:#f44336; }
.toggle { margin-top:5px; padding:5px 10px; background:#4CAF50; border:none; color:#fff; cursor:pointer; border-radius:4px; }
.toggle.off { background:#f44336; }
#noOrders { margin-top:10px; text-align:center; }
#orderOverlay, #activeOrderPanel { position:absolute; bottom:10px; left:50%; transform:translateX(-50%); background:#1e1e1e; padding:10px 15px; border-radius:8px; display:none; z-index:3; width:90%; max-width:360px; }
#orderOverlay.show, #activeOrderPanel.show { display:block; }
#orderOverlay div, #activeOrderPanel div { margin:5px 0; }
button { cursor:pointer; border:none; padding:5px 10px; border-radius:4px; margin-right:5px; }
#toast { position:absolute; bottom:80px; left:50%; transform:translateX(-50%); background:#333; padding:8px 12px; border-radius:4px; display:none; opacity:0.9; }
#toast.show { display:block; }
</style>
</head>
<body>

<div id="map"></div>

<div id="ui">
  <div><span id="statusDot" class="status-dot"></span><span id="statusText">Онлайн — жду заказ</span></div>
  <button id="toggleBtn" class="toggle">Переключить</button>
  <div>Баланс: <span id="balanceVal">50€</span></div>
  <div>Поездки: <span id="tripsVal">0</span></div>
  <div>Заработано: <span id="earnVal">0€</span></div>
  <div id="noOrders">
    <div class="no-orders-icon">🚕</div>
    <div class="no-orders-text">Ждём заказов...</div>
  </div>
</div>

<div id="orderOverlay">
  <div>Цена: <span id="orderPrice">0€</span></div>
  <div>От: <span id="orderFrom">—</span></div>
  <div>До: <span id="orderTo">—</span></div>
  <button id="btnAccept">✅ ПРИНЯТЬ</button>
  <button id="btnReject">❌ ОТКАЗАТЬ</button>
</div>

<div id="activeOrderPanel">
  <div>От: <span id="activeFrom">—</span></div>
  <div>До: <span id="activeTo">—</span></div>
  <button id="btnArrived">📍 Я прибыл</button>
  <button id="btnComplete">🏁 Завершить</button>
  <button id="btnCancel">❌ Отменить</button>
</div>

<div id="toast"></div>

<script src="https://api.mapbox.com/mapbox-gl-js/v2.20.0/mapbox-gl.js"></script>
<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const DRIVER_ID = tg.initDataUnsafe?.user?.id;
const DRIVER_NAME = tg.initDataUnsafe?.user?.first_name || 'Водитель';
const TALLINN = [24.7536, 59.4370];

let isOnline = true;
let currentOrder = null;
let activeOrderId = null;
let trips = 0, earned = 0, balance = 50;
let userMarker = null, clientMarker = null;
let browserWatchId = null;
let myLat = null, myLon = null;
let pollInterval = null;

const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/dark-v11',
  center: TALLINN, zoom: 12,
  attributionControl: false
});

// ── ГЕОЛОКАЦИЯ ──
function initLocation() {
  if (tg.LocationManager && typeof tg.LocationManager.init === 'function') {
    tg.LocationManager.init(() => {
      if (tg.LocationManager.isLocationAvailable) getTelegramLocation();
      else startBrowserLocation();
    });
  } else startBrowserLocation();
}

function getTelegramLocation() {
  tg.LocationManager.getLocation(loc => { if (loc) updatePosition(loc.latitude, loc.longitude); });
}

function startBrowserLocation() {
  if (!navigator.geolocation) return;
  if (browserWatchId !== null) navigator.geolocation.clearWatch(browserWatchId);
  browserWatchId = navigator.geolocation.watchPosition(
    pos => updatePosition(pos.coords.latitude, pos.coords.longitude),
    err => console.warn('Геолокация:', err.message),
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 5000 }
  );
}

function updatePosition(lat, lon) {
  myLat = lat; myLon = lon;
  if (!userMarker) {
    const el = document.createElement('div');
    el.style.cssText = 'width:18px;height:18px;background:#FFD600;border:3px solid white;border-radius:50%;box-shadow:0 0 0 4px rgba(255,214,0,0.3)';
    userMarker = new mapboxgl.Marker(el).setLngLat([lon, lat]).addTo(map);
    map.flyTo({ center: [lon, lat], zoom: 14 });
  } else userMarker.setLngLat([lon, lat]);
  if (activeOrderId) sendLocationToServer(lat, lon);
}

function sendLocationToServer(lat, lon) {
  fetch(`/api/driver_location/${activeOrderId}`, {
    method: 'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ lat, lon })
  }).catch(()=>{});
}

document.addEventListener('visibilitychange', () => {
  if (!document.hidden) {
    if (tg.LocationManager && tg.LocationManager.isInited) getTelegramLocation();
    else startBrowserLocation();
  }
});

initLocation();

// ── UI ──
function updateUI() {
  document.getElementById('balanceVal').textContent = balance + '€';
  document.getElementById('tripsVal').textContent = trips;
  document.getElementById('earnVal').textContent = earned + '€';
}
updateUI();

document.getElementById('toggleBtn').addEventListener('click', toggleStatus);
document.getElementById('btnAccept').addEventListener('click', acceptOrder);
document.getElementById('btnReject').addEventListener('click', rejectOrder);
document.getElementById('btnArrived').addEventListener('click', markArrived);
document.getElementById('btnComplete').addEventListener('click', completeOrder);
document.getElementById('btnCancel').addEventListener('click', cancelActiveOrder);

function toggleStatus() {
  isOnline = !isOnline;
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  const btn = document.getElementById('toggleBtn');
  const stat = document.getElementById('statStatus');
  if (isOnline) {
    dot.className = 'status-dot';
    text.textContent = 'Онлайн — жду заказ';
    btn.className = 'toggle';
    showToast('🟢 Вы онлайн');
    startPolling();
  } else {
    dot.className = 'status-dot offline';
    text.textContent = 'Офлайн';
    btn.className = 'toggle off';
    hideNewOrder();
    document.getElementById('noOrders').innerHTML = '<div class="no-orders-icon">⛔</div><div class="no-orders-text">Вы офлайн</div>';
    showToast('🔴 Вы офлайн');
  }
}

function showNewOrder(order) {
  currentOrder = order;
  document.getElementById('orderPrice').textContent = order.price + '€';
  document.getElementById('orderFrom').textContent = order.from_address || '—';
  document.getElementById('orderTo').textContent = order.to_address || '—';
  document.getElementById('orderOverlay').classList.add('show');
  document.getElementById('noOrders').style.display = 'none';
  if (order.from_lat && order.from_lon) {
    if (clientMarker) clientMarker.remove();
    clientMarker = new mapboxgl.Marker({ color: '#4CAF50' })
      .setLngLat([order.from_lon, order.from_lat]).addTo(map);
    map.flyTo({ center: [order.from_lon, order.from_lat], zoom: 13 });
  }
}

function hideNewOrder() {
  document.getElementById('orderOverlay').classList.remove('show');
  currentOrder = null;
  if (clientMarker) { clientMarker.remove(); clientMarker = null; }
  if (isOnline) {
    document.getElementById('noOrders').innerHTML = '<div class="no-orders-icon">🚕</div><div class="no-orders-text">Ждём заказов...</div>';
    document.getElementById('noOrders').style.display = 'block';
  }
}

function showActiveOrder(order) {
  activeOrderId = order.id;
  document.getElementById('activeFrom').textContent = order.from_address || order.from || '—';
  document.getElementById('activeTo').textContent = order.to_address || order.to || '—';
  document.getElementById('activeOrderPanel').classList.add('show');
  document.getElementById('noOrders').style.display = 'none';
  document.getElementById('statusText').textContent = '🚖 Везу клиента';
}

function hideActiveOrder() {
  document.getElementById('activeOrderPanel').classList.remove('show');
  activeOrderId = null;
  document.getElementById('statusText').textContent = 'Онлайн — жду заказ';
  if (isOnline) {
    document.getElementById('noOrders').innerHTML = '<div class="no-orders-icon">🚕</div><div class="no-orders-text">Ждём заказов...</div>';
    document.getElementById('noOrders').style.display = 'block';
  }
}

// ── ДЕЙСТВИЯ ──
async function acceptOrder() {
  if (!currentOrder) return;
  const btn = document.getElementById('btnAccept'); btn.disabled = true; btn.textContent = 'Принимаем...';
  try {
    const r = await fetch(`/api/accept_order/${currentOrder.id}`, {
      method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ driver_id: DRIVER_ID, driver_name: DRIVER_NAME })
    });
    const result = await r.json();
    if (result.ok) {
      trips++; earned += currentOrder.price || 0; balance = Math.max(0, balance - 1); updateUI();
      showToast('✅ Заказ принят!');
      const order = currentOrder;
      hideNewOrder(); currentOrder = null;
      showActiveOrder(order);
    } else { showToast('❌ ' + (result.error || 'Ошибка')); btn.disabled=false; btn.textContent='✅ ПРИНЯТЬ'; }
  } catch(e) { showToast('❌ Ошибка'); btn.disabled=false; btn.textContent='✅ ПРИНЯТЬ'; console.error(e); }
}

async function rejectOrder() {
  if (!currentOrder) return;
  try { await fetch(`/api/reject_order/${currentOrder.id}`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ driver_id: DRIVER_ID }) }); } catch(e){}
  showToast('❌ Заказ отклонён'); hideNewOrder();
}

async function markArrived() { if (!activeOrderId) return; const btn=document.getElementById('btnArrived'); btn.disabled=true; try { const r=await fetch(`/api/arrived/${activeOrderId}`,{method:'POST'}); const result=await r.json(); if(result.ok){showToast('📍 Клиент уведомлён!');btn.textContent='✅ Клиент уведомлён';}else btn.disabled=false;}catch(e){showToast('❌ Ошибка');btn.disabled=false;} }

async function completeOrder() { if(!activeOrderId) return; try{ const r=await fetch(`/api/complete_order/${activeOrderId}`,{method:'POST'}); const result=await r.json(); if(result.ok){showToast('🏁 Поездка завершена!');hideActiveOrder();startPolling();}}catch(e){showToast('❌ Ошибка');} }

async function cancelActiveOrder() { if(!activeOrderId) return; if(!confirm('Отменить заказ?')) return; try{ const r=await fetch(`/api/cancel_order_driver/${activeOrderId}`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({driver_id:DRIVER_ID}) }); const result=await r.json(); if(result.ok){trips=Math.max(0,trips-1);updateUI();showToast('❌ Заказ отменён');hideActiveOrder();startPolling();}}catch(e){showToast('❌ Ошибка');} }

// ── POLLING ──
async function pollOrders() { if(!isOnline || activeOrderId) return; try{ const res=await fetch('/api/orders'); if(res.ok){ const orders=await res.json(); if(orders.length>0) showNewOrder(orders[0]); }}catch(e){console.error(e);} }
function startPolling(){ clearInterval(pollInterval); pollInterval=setInterval(pollOrders,4000); pollOrders(); }

function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }

startPolling();
</script>
</body>
</html>
