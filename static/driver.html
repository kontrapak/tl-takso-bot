<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TL.TAKSO — Водитель</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#f5f5f5; font-family:sans-serif; height:100dvh; display:flex; flex-direction:column; overflow:hidden; }

.header { display:flex; justify-content:space-between; padding:10px 14px; background:#fff; border-bottom:1px solid #ddd; }
.logo { font-size:18px; font-weight:700; color:#2196F3; }
.balance { font-weight:700; color:#2196F3; }

.statusbar { display:flex; justify-content:space-between; padding:8px 14px; background:#fff; border-bottom:1px solid #ddd; }
.status-left { display:flex; gap:8px; font-size:13px; font-weight:600; }
.dot { width:8px; height:8px; background:#4CAF50; border-radius:50%; }
#toggleBtn { width:50px; height:26px; background:#4CAF50; border-radius:13px; border:none; cursor:pointer; position:relative; }
#toggleBtn::after { content:''; position:absolute; width:20px; height:20px; background:#fff; border-radius:50%; top:3px; left:3px; }

.driver-marker { background:#2196F3; width:20px; height:20px; border:3px solid white; border-radius:50%; box-shadow:0 2px 6px rgba(0,0,0,0.3); }
.driver-marker::after { content:''; position:absolute; width:20px; height:20px; margin:-10px 0 0 -10px; background:rgba(33,150,243,0.4); border-radius:50%; animation:pulse 2s ease-out infinite; }
@keyframes pulse { 0%{transform:scale(1);opacity:0.6} 100%{transform:scale(4);opacity:0} }

.order-card, .active-sheet { background:#fff; border-radius:20px 20px 0 0; padding:16px; position:absolute; bottom:0; left:0; right:0; transform:translateY(100%); transition:transform 0.4s; z-index:30; }
.order-card.show, .active-sheet.show { transform:translateY(0); }

#map { flex:1; background:#e0e0e0; z-index:1; }
.leaflet-control-attribution, .leaflet-control-zoom { display:none; }
</style>
</head>
<body>

<div class="header"><div class="logo">TL.TAKSO</div><div class="balance" id="balanceVal">50€</div></div>
<div class="statusbar"><div class="status-left"><div class="dot" id="statusDot"></div><span id="statusText">Онлайн — жду заказ</span></div><button id="toggleBtn" onclick="toggleStatus()"></button></div>
<div id="map"></div>
<div class="order-card" id="orderCard"><div class="order-card-title">📋 НОВЫЙ ЗАКАЗ</div><div class="order-price-big" id="orderPrice">—€</div><div class="order-route"><div>🚩 <span id="orderFrom">—</span></div><div>🏁 <span id="orderTo">—</span></div></div><button class="btn-yes" id="btnAccept" onclick="acceptOrder()">✅ ПРИНЯТЬ</button><button onclick="rejectOrder()">❌ ОТКАЗ</button></div>
<div class="active-sheet" id="activeSheet"><div><span id="activeTo">—</span></div><button id="btnArrived" onclick="markArrived()">📍 Прибыл</button><button onclick="completeOrder()">✅ Завершить</button></div>

<script>
const tg = window.Telegram.WebApp;
tg.ready(); tg.expand();
const DRIVER_ID = tg.initDataUnsafe?.user?.id;
const MAPBOX_TOKEN = 'pk.eyJ1IjoidGx0YWtzbyIsImEiOiJjbW4zYW0yMGkxNG13MnByM2hoZng0OXh2In0.ArR_nk-dVg99VhuuatH2hA';
let isOnline = true, myLat=null, myLon=null, userMarker=null;

// СВЕТЛАЯ КАРТА (плитки CartoDB)
const map = L.map('map').setView([59.4370, 24.7536], 12);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OSM & CartoDB',
  subdomains: 'abcd'
}).addTo(map);

const driverIcon = L.divIcon({ className: 'driver-marker', iconSize: [20,20] });

function updatePosition(lat, lon) {
  myLat=lat; myLon=lon;
  if(!userMarker) userMarker = L.marker([lat,lon], {icon:driverIcon}).addTo(map);
  else userMarker.setLatLng([lat,lon]);
  map.setView([lat,lon], 14);
}

function initLocation() {
  if (tg.LocationManager?.init) {
    tg.LocationManager.init(() => {
      if (tg.LocationManager.isLocationAvailable)
        tg.LocationManager.getLocation(loc => { if(loc) updatePosition(loc.latitude, loc.longitude); });
    });
  } else if (navigator.geolocation) {
    navigator.geolocation.watchPosition(p => updatePosition(p.coords.latitude, p.coords.longitude), null, {enableHighAccuracy:true});
  }
}
initLocation();

async function acceptOrder() { alert("Принято (заглушка)"); }
async function rejectOrder() { alert("Отклонено"); }
async function markArrived() { alert("Прибыл"); }
async function completeOrder() { alert("Завершено"); }
function toggleStatus() { isOnline=!isOnline; document.getElementById('statusDot').style.background = isOnline ? '#4CAF50' : '#f44336'; }
</script>
</body>
</html>
