<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TL.TAKSO — Водитель</title>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: system-ui, sans-serif; background:#0A0A0A; color:#fff; height:100vh; display:flex; flex-direction:column; }
.header { display:flex; justify-content:space-between; padding:12px 16px; border-bottom:1px solid #222; }
.logo { font-size:22px; font-weight:bold; color:#FFD600; }
.balance-value { font-size:20px; font-weight:bold; color:#FFD600; }
.status-bar { display:flex; justify-content:space-between; padding:10px 16px; background:#111; }
.toggle { width:52px; height:28px; background:#00E676; border-radius:14px; cursor:pointer; border:none; }
.toggle.off { background:#555; }
.toggle::after { content:''; display:block; width:22px; height:22px; background:#fff; border-radius:50%; margin:3px; transition:0.2s; }
.toggle.off::after { margin-left:27px; }
#map { flex:1; position:relative; }
.order-overlay, .trip-panel { position:absolute; bottom:0; left:0; right:0; background:#111; border-top:2px solid #FFD600; border-radius:20px 20px 0 0; padding:16px; transform:translateY(100%); transition:0.3s; z-index:10; }
.order-overlay.show, .trip-panel.show { transform:translateY(0); }
.btn-accept { background:#FFD600; color:#000; border:none; padding:14px; border-radius:12px; font-weight:bold; width:100%; margin-top:10px; }
.btn-reject, .btn-cancel { background:transparent; border:1px solid #FF3B30; color:#FF3B30; padding:10px; border-radius:12px; margin-top:8px; width:100%; }
.btn-arrived, .btn-finish { background:#00E676; color:#000; border:none; padding:14px; border-radius:12px; font-weight:bold; width:100%; margin-top:8px; }
.btn-finish { background:#FFD600; }
.bottom-panel { display:flex; gap:10px; padding:12px 16px; background:#111; }
.stat-block { flex:1; background:#1A1A1A; padding:10px; border-radius:12px; text-align:center; }
.toast { position:fixed; top:80px; left:50%; transform:translateX(-50%); background:#FFD600; color:#000; padding:8px 16px; border-radius:30px; font-weight:bold; opacity:0; transition:0.3s; z-index:100; }
.toast.show { opacity:1; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">TL.TAKSO</div>
  <div class="balance-block">
    <div style="font-size:12px; color:#888;">БАЛАНС</div>
    <div class="balance-value" id="balanceVal">—€</div>
  </div>
</div>

<div class="status-bar">
  <span id="statusText">🟢 Онлайн</span>
  <button class="toggle" id="toggleBtn" onclick="toggleStatus()"></button>
</div>

<div id="map"></div>

<div class="order-overlay" id="orderOverlay">
  <div style="font-size:18px; font-weight:bold;">📋 НОВЫЙ ЗАКАЗ</div>
  <div id="orderPrice" style="font-size:28px; color:#FFD600;">—€</div>
  <div><span>📍</span> <span id="orderFrom">—</span></div>
  <div><span>🎯</span> <span id="orderTo">—</span></div>
  <button class="btn-accept" onclick="acceptOrder()">✅ ПРИНЯТЬ</button>
  <button class="btn-reject" onclick="rejectOrder()">ОТКАЗ</button>
</div>

<div class="trip-panel" id="tripPanel">
  <div style="font-size:18px; font-weight:bold;">🚖 Поездка</div>
  <button class="btn-arrived" onclick="arrived()">📍 Я прибыл!</button>
  <button class="btn-finish" onclick="finishTrip()">✅ Завершить поездку</button>
  <button class="btn-cancel" onclick="cancelTrip()">❌ Отменить</button>
</div>

<div class="bottom-panel">
  <div class="stat-block"><div>ПОЕЗДОК</div><div id="tripsVal">0</div></div>
  <div class="stat-block"><div>СЕГОДНЯ</div><div id="earnVal">0€</div></div>
</div>

<div class="toast" id="toast"></div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

mapboxgl.accessToken = 'pk.eyJ1IjoidGx0YWtzbyIsImEiOiJjbW4zYW0yMGkxNG13MnByM2hoZng0OXh2In0.ArR_nk-dVg99VhuuatH2hA';
const map = new mapboxgl.Map({ container: 'map', style: 'mapbox://styles/mapbox/dark-v11', center: [24.7536, 59.4370], zoom: 12 });

let isOnline = true, currentOrder = null, trips = 0, earned = 0, balance = 50;
let userMarker = null, routeLayer = null;

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function updateUI() {
  document.getElementById('balanceVal').textContent = balance + '€';
  document.getElementById('tripsVal').textContent = trips;
  document.getElementById('earnVal').textContent = earned + '€';
}
updateUI();

function toggleStatus() {
  isOnline = !isOnline;
  const btn = document.getElementById('toggleBtn');
  const statusText = document.getElementById('statusText');
  if (isOnline) {
    btn.classList.remove('off');
    statusText.innerHTML = '🟢 Онлайн';
    startPolling();
  } else {
    btn.classList.add('off');
    statusText.innerHTML = '🔴 Офлайн';
  }
}

async function pollOrders() {
  if (!isOnline) return;
  const res = await fetch('/api/orders');
  const orders = await res.json();
  if (orders.length > 0 && !currentOrder) {
    currentOrder = orders[0];
    document.getElementById('orderPrice').textContent = currentOrder.price + '€';
    document.getElementById('orderFrom').textContent = currentOrder.from_address;
    document.getElementById('orderTo').textContent = currentOrder.to_address;
    document.getElementById('orderOverlay').classList.add('show');
  }
}

async function acceptOrder() {
  await fetch('/api/accept_order/' + currentOrder.id, { method: 'POST' });
  document.getElementById('orderOverlay').classList.remove('show');
  document.getElementById('tripPanel').classList.add('show');
  drawRouteToClient();
  startLocationTracking();
  showToast('✅ Заказ принят');
}

function drawRouteToClient() {
  if (!currentOrder) return;
  const from = [currentOrder.from_lon, currentOrder.from_lat];
  const to = [currentOrder.to_lon, currentOrder.to_lat];
  fetch(`https://api.mapbox.com/directions/v5/mapbox/driving/${from[0]},${from[1]};${to[0]},${to[1]}?geometries=geojson&access_token=${mapboxgl.accessToken}`)
    .then(res => res.json())
    .then(data => {
      if (routeLayer) map.removeLayer('route').removeSource('route');
      map.addSource('route', { type: 'geojson', data: data.routes[0].geometry });
      map.addLayer({ id: 'route', type: 'line', source: 'route', paint: { 'line-color': '#FFD600', 'line-width': 4 } });
    });
}

function startLocationTracking() {
  setInterval(() => {
    if (!userMarker) return;
    const lngLat = userMarker.getLngLat();
    fetch('/api/driver_location', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ driver_id: tg.initDataUnsafe?.user?.id, lat: lngLat.lat, lon: lngLat.lng })
    });
  }, 3000);
}

async function arrived() {
  await fetch('/api/driver_arrived/' + currentOrder.id, { method: 'POST' });
  showToast('📍 Клиент уведомлён');
}

async function finishTrip() {
  await fetch('/api/finish_order', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ order_id: currentOrder.id })
  });
  trips++;
  earned += currentOrder.price;
  balance = Math.max(0, balance - 1);
  updateUI();
  document.getElementById('tripPanel').classList.remove('show');
  if (routeLayer) map.removeLayer('route').removeSource('route');
  currentOrder = null;
  showToast('🏁 Поездка завершена');
}

function rejectOrder() { document.getElementById('orderOverlay').classList.remove('show'); currentOrder = null; }
function cancelTrip() { document.getElementById('tripPanel').classList.remove('show'); currentOrder = null; }

// Геолокация
navigator.geolocation.watchPosition(pos => {
  const { latitude, longitude } = pos.coords;
  if (!userMarker) {
    userMarker = new mapboxgl.Marker({ color: '#FFD600' }).setLngLat([longitude, latitude]).addTo(map);
    map.flyTo({ center: [longitude, latitude], zoom: 14 });
  } else userMarker.setLngLat([longitude, latitude]);
}, null, { enableHighAccuracy: true });

startPolling();
setInterval(pollOrders, 4000);
</script>
</body>
</html>
