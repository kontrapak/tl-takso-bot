<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TL.TAKSO — Водитель</title>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* === твои стили без изменений === */
* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --yellow: #FFD600; --black: #0A0A0A; --dark: #111111; --card: #1A1A1A; --border: #2A2A2A; --muted: #888; --green: #00E676; --red: #FF3B30; }
body { background: var(--black); color: #fff; font-family: 'Inter', sans-serif; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
/* ... весь твой CSS оставлен без изменений ... */
</style>
</head>
<body>

<div class="header">
  <div class="logo">TL<span>.</span>TAKSO</div>
  <div class="balance-block">
    <div class="balance-label">БАЛАНС</div>
    <div class="balance-value" id="balanceVal">—€</div>
  </div>
</div>

<div class="status-bar">
  <div class="status-text">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Онлайн — жду заказ</span>
  </div>
  <button class="toggle" id="toggleBtn" onclick="toggleStatus()"></button>
</div>

<div id="map">
  <div class="no-orders" id="noOrders">
    <div class="no-orders-icon">🚕</div>
    <div class="no-orders-text">Ждём заказов...</div>
  </div>

  <!-- Новый заказ -->
  <div class="order-overlay" id="orderOverlay">
    <div class="order-header">
      <div class="order-title">📋 НОВЫЙ ЗАКАЗ</div>
      <div class="order-price" id="orderPrice">—€</div>
    </div>
    <div class="order-route">
      <div class="route-item">
        <div class="route-icon">📍</div>
        <div class="route-info">
          <div class="route-label">ОТКУДА</div>
          <div class="route-addr" id="orderFrom">—</div>
        </div>
      </div>
      <div class="route-item">
        <div class="route-icon">🎯</div>
        <div class="route-info">
          <div class="route-label">КУДА</div>
          <div class="route-addr" id="orderTo">—</div>
        </div>
      </div>
    </div>
    <div class="order-actions">
      <button class="btn-accept" id="btnAccept" onclick="acceptOrder()">✅ ПРИНЯТЬ</button>
      <button class="btn-reject" onclick="rejectOrder()">ОТКАЗ</button>
    </div>
  </div>

  <!-- Активный заказ -->
  <div class="active-order" id="activeOrderPanel">
    <div class="active-title">🚖 АКТИВНЫЙ ЗАКАЗ</div>
    <div class="active-route">
      <div class="from">📍 <span id="activeFrom">—</span></div>
      <div class="to">🏁 <span id="activeTo">—</span></div>
    </div>
    <button class="btn-arrived" id="btnArrived" onclick="markArrived()">📍 Я ПРИБЫЛ!</button>
    <button class="btn-done" id="btnDone" onclick="completeOrder()">✅ ПОЕЗДКА ЗАВЕРШЕНА</button>
    <button class="btn-cancel-order" onclick="cancelActiveOrder()">❌ Отменить заказ</button>
  </div>
</div>

<div class="bottom-panel">
  <div class="stat-block">
    <div class="stat-label">ПОЕЗДОК</div>
    <div class="stat-value" id="tripsVal">0</div>
  </div>
  <div class="stat-block">
    <div class="stat-label">СЕГОДНЯ</div>
    <div class="stat-value yellow" id="earnVal">0€</div>
  </div>
  <div class="stat-block">
    <div class="stat-label">СТАТУС</div>
    <div class="stat-value" id="statStatus" style="font-size:14px;padding-top:4px">🟢</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const DRIVER_ID = String(tg.initDataUnsafe?.user?.id); // исправлено, чтобы точно был строкой
const DRIVER_NAME = tg.initDataUnsafe?.user?.first_name || 'Водитель';
const MAPBOX_TOKEN = 'pk.eyJ1IjoidGx0YWtzbyIsImEiOiJjbW4zYW0yMGkxNG13MnByM2hoZng0OXh2In0.ArR_nk-dVg99VhuuatH2hA';
const TALLINN = [24.7536, 59.4370];

let isOnline = true;
let currentOrder = null;
let activeOrderId = null;
let trips = 0, earned = 0, balance = 50;
let userMarker = null, clientMarker = null;
let browserWatchId = null;
let myLat = null, myLon = null;

const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/dark-v11',
  center: TALLINN, zoom: 12,
  attributionControl: false
});

// === геолокация ===
function initLocation() {
  if (tg.LocationManager && typeof tg.LocationManager.init === 'function') {
    tg.LocationManager.init(() => {
      if (tg.LocationManager.isLocationAvailable) getTelegramLocation();
      else startBrowserLocation();
    });
  } else startBrowserLocation();
}

function getTelegramLocation() {
  tg.LocationManager.getLocation(loc => { if (loc) updatePosition(loc.latitude, loc.longitude); });
}

function startBrowserLocation() {
  if (!navigator.geolocation) return;
  if (browserWatchId !== null) navigator.geolocation.clearWatch(browserWatchId);
  browserWatchId = navigator.geolocation.watchPosition(
    pos => updatePosition(pos.coords.latitude, pos.coords.longitude),
    err => console.warn('Геолокация:', err.message),
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 5000 }
  );
}

function updatePosition(lat, lon) {
  myLat = lat; myLon = lon;
  if (!userMarker) {
    const el = document.createElement('div');
    el.style.cssText = 'width:18px;height:18px;background:#FFD600;border:3px solid white;border-radius:50%;box-shadow:0 0 0 4px rgba(255,214,0,0.3)';
    userMarker = new mapboxgl.Marker(el).setLngLat([lon, lat]).addTo(map);
    map.flyTo({ center: [lon, lat], zoom: 14 });
  } else userMarker.setLngLat([lon, lat]);
  if (activeOrderId) sendLocationToServer(lat, lon);
}

function sendLocationToServer(lat, lon) {
  fetch(`/api/driver_location/${activeOrderId}`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ lat, lon })
  }).catch(() => {});
}

document.addEventListener('visibilitychange', () => {
  if (!document.hidden) {
    if (tg.LocationManager && tg.LocationManager.isInited) getTelegramLocation();
    else startBrowserLocation();
  }
});

initLocation();

// === UI ===
function updateUI() {
  document.getElementById('balanceVal').textContent = balance + '€';
  document.getElementById('tripsVal').textContent = trips;
  document.getElementById('earnVal').textContent = earned + '€';
}
updateUI();

function toggleStatus() {
  isOnline = !isOnline;
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  const btn = document.getElementById('toggleBtn');
  const stat = document.getElementById('statStatus');
  if (isOnline) {
    dot.className = 'status-dot';
    text.textContent = 'Онлайн — жду заказ';
    btn.className = 'toggle';
    stat.textContent = '🟢';
    document.getElementById('noOrders').style.display = 'block';
    showToast('🟢 Вы онлайн');
    startPolling();
  } else {
    dot.className = 'status-dot offline';
    text.textContent = 'Офлайн';
    btn.className = 'toggle off';
    stat.textContent = '🔴';
    hideNewOrder();
    document.getElementById('noOrders').innerHTML = '<div class="no-orders-icon">⛔</div><div class="no-orders-text">Вы офлайн</div>';
    showToast('🔴 Вы офлайн');
  }
}

// === POLLING исправлено ===
async function pollOrders() {
  if (!isOnline || currentOrder || activeOrderId) return;
  try {
    const res = await fetch('/api/orders');
    if (res.ok) {
      const orders = await res.json();
      if (orders.length > 0) showNewOrder(orders[0]);
    }
  } catch(e) {}
}

let pollInterval;
function startPolling() {
  clearInterval(pollInterval);
  pollInterval = setInterval(pollOrders, 4000);
  pollOrders();
}

// === остальные функции UI и заказов оставлены без изменений ===
</script>
</body>
</html>
