<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TL.TAKSO — Слежение</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0A0A0A; color:#fff; font-family:-apple-system,sans-serif; height:100dvh; display:flex; flex-direction:column; overflow:hidden; }

.header { padding:12px 16px; background:#111; border-bottom:1px solid #2A2A2A; display:flex; align-items:center; justify-content:space-between; }
.logo { font-size:18px; font-weight:700; color:#FFD600; letter-spacing:2px; }
.status-badge { background:#1A1A1A; border:1px solid #2A2A2A; border-radius:20px; padding:6px 14px; font-size:12px; font-weight:600; }
.status-badge.arrived { border-color:#FFD600; color:#FFD600; }
.status-badge.accepted { border-color:#00E676; color:#00E676; }
.status-badge.done { border-color:#aaa; color:#aaa; }

#map { flex:1; position:relative; min-height:0; }

.arrived-banner { display:none; background:#FFD600; color:#000; text-align:center; padding:14px; font-weight:700; font-size:16px; }
.arrived-banner.show { display:block; }

.done-banner { display:none; background:#1A1A1A; border-top:2px solid #FFD600; color:#fff; text-align:center; padding:16px; }
.done-banner.show { display:block; }
.done-banner p { font-size:15px; margin-bottom:12px; }
.btn-close { width:100%; padding:14px; background:#FFD600; color:#000; border:none; border-radius:12px; font-size:16px; font-weight:700; cursor:pointer; }

.info-panel { background:#111; border-top:2px solid #FFD600; padding:14px 16px; }
.driver-info { display:flex; align-items:center; gap:12px; margin-bottom:10px; }
.driver-icon { width:40px; height:40px; background:#1A1A1A; border-radius:50%; border:2px solid #FFD600; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
.driver-name { font-weight:700; font-size:15px; }
.driver-sub { font-size:12px; color:#888; margin-top:2px; }
.route-info { background:#1A1A1A; border-radius:12px; padding:10px 12px; }
.route-row { display:flex; align-items:flex-start; gap:10px; padding:5px 0; font-size:13px; }
.route-row+.route-row { border-top:1px solid #2A2A2A; }
.route-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; margin-top:3px; }
.route-dot.from { background:#4CAF50; }
.route-dot.to { background:#FFD600; }

.mapboxgl-ctrl-logo,.mapboxgl-ctrl-attrib { display:none !important; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">TL.TAKSO</div>
  <div class="status-badge accepted" id="statusBadge">🚖 Едет к вам</div>
</div>

<div id="map"></div>

<div class="arrived-banner" id="arrivedBanner">
  📍 Водитель прибыл! Выходите! 🚕
</div>

<div class="done-banner" id="doneBanner">
  <p>🏁 <b>Поездка завершена!</b><br>Спасибо что выбрали TL.TAKSO!</p>
  <button class="btn-close" onclick="closePage()">Закрыть</button>
</div>

<div class="info-panel" id="infoPanel">
  <div class="driver-info">
    <div class="driver-icon">🧑‍✈️</div>
    <div>
      <div class="driver-name" id="driverName">Загружаем...</div>
      <div class="driver-sub" id="driverStatus">Едет к вам</div>
    </div>
  </div>
  <div class="route-info">
    <div class="route-row">
      <div class="route-dot from"></div>
      <span id="fromAddr">—</span>
    </div>
    <div class="route-row">
      <div class="route-dot to"></div>
      <span id="toAddr">—</span>
    </div>
  </div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const MAPBOX_TOKEN = 'pk.eyJ1IjoidGx0YWtzbyIsImEiOiJjbW4zYW0yMGkxNG13MnByM2hoZng0OXh2In0.ArR_nk-dVg99VhuuatH2hA';
const params = new URLSearchParams(window.location.search);
const ORDER_ID = params.get('order');

if (!ORDER_ID) {
  document.getElementById('driverName').textContent = 'Заказ не найден';
}

mapboxgl.accessToken = MAPBOX_TOKEN;
const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/dark-v11',
  center: [24.7536, 59.4370],
  zoom: 13,
  attributionControl: false
});

let driverMarker = null;
let lastStatus = null;
let initialized = false;
let pollTimer = null;

async function fetchStatus() {
  if (!ORDER_ID) return;
  try {
    const r = await fetch(`/api/order_status/${ORDER_ID}`);
    const data = await r.json();
    if (!data.ok) return;

    if (data.driver_name) {
      document.getElementById('driverName').textContent = data.driver_name;
    }

    if (data.status !== lastStatus) {
      lastStatus = data.status;
      updateStatus(data.status);
    }

    if (!initialized) {
      initialized = true;
      if (data.from_lat && data.from_lon) {
        const el = document.createElement('div');
        el.style.cssText = 'width:14px;height:14px;background:#4CAF50;border:3px solid white;border-radius:50%';
        new mapboxgl.Marker({ element: el }).setLngLat([data.from_lon, data.from_lat]).addTo(map);
      }
      if (data.to_lat && data.to_lon) {
        const el = document.createElement('div');
        el.textContent = '🏁';
        el.style.fontSize = '20px';
        new mapboxgl.Marker({ element: el }).setLngLat([data.to_lon, data.to_lat]).addTo(map);
      }
      document.getElementById('fromAddr').textContent = data.from_address || '—';
      document.getElementById('toAddr').textContent = data.to_address || '—';
    }

    if (data.driver_lat && data.driver_lon) {
      if (!driverMarker) {
        const el = document.createElement('div');
        el.textContent = '🚕';
        el.style.cssText = 'font-size:28px;line-height:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.5))';
        driverMarker = new mapboxgl.Marker({ element: el })
          .setLngLat([data.driver_lon, data.driver_lat]).addTo(map);
        map.flyTo({ center: [data.driver_lon, data.driver_lat], zoom: 14 });
      } else {
        driverMarker.setLngLat([data.driver_lon, data.driver_lat]);
      }
    }

  } catch(e) {
    console.error(e);
  }
}

function updateStatus(status) {
  const badge = document.getElementById('statusBadge');
  const sub = document.getElementById('driverStatus');

  if (status === 'arrived') {
    badge.className = 'status-badge arrived';
    badge.textContent = '📍 Прибыл!';
    sub.textContent = 'Водитель ждёт вас';
    document.getElementById('arrivedBanner').classList.add('show');
    if (navigator.vibrate) navigator.vibrate([300, 100, 300]);

  } else if (status === 'accepted') {
    badge.className = 'status-badge accepted';
    badge.textContent = '🚖 Едет к вам';
    sub.textContent = 'Едет к вам';

  } else if (status === 'done') {
    badge.className = 'status-badge done';
    badge.textContent = '✅ Завершено';
    sub.textContent = 'Поездка завершена';
    document.getElementById('arrivedBanner').classList.remove('show');
    document.getElementById('infoPanel').style.display = 'none';
    document.getElementById('doneBanner').classList.add('show');
    // Останавливаем polling
    if (pollTimer) clearInterval(pollTimer);
    if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
  }
}

function closePage() {
  tg.close();
}

fetchStatus();
pollTimer = setInterval(fetchStatus, 4000);
</script>
</body>
</html>
