<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TL.TAKSO — Слежение</title>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#121212; color:#fff; font-family:sans-serif; height:100dvh; display:flex; flex-direction:column; overflow:hidden; }

#map { flex:1; position:relative; min-height:0; }

.panel {
  background:#1a1a1a;
  border-top:3px solid #FFD600;
  padding:14px 16px;
  z-index:10;
}

.status-row {
  display:flex; align-items:center; gap:10px;
  margin-bottom:10px;
}
.status-dot {
  width:10px; height:10px; border-radius:50%; background:#FFD600;
  animation: pulse 1.5s infinite;
}
@keyframes pulse {
  0%,100% { opacity:1; }
  50% { opacity:0.3; }
}
.status-text { font-size:14px; font-weight:700; color:#FFD600; }

.info-row {
  display:flex; gap:8px; margin-bottom:10px;
}
.info-box {
  flex:1; background:#111; border-radius:10px; padding:10px; text-align:center;
}
.info-label { font-size:10px; color:#555; text-transform:uppercase; margin-bottom:3px; }
.info-val { font-size:15px; font-weight:700; color:#fff; }

.route-box {
  background:#111; border-radius:10px; padding:10px 12px; margin-bottom:10px;
}
.route-line { display:flex; gap:10px; align-items:flex-start; padding:5px 0; font-size:12px; color:#ccc; }
.route-line + .route-line { border-top:1px solid #222; }
.rdot { width:8px; height:8px; border-radius:50%; flex-shrink:0; margin-top:3px; }
.rdot.from { background:#4CAF50; }
.rdot.to { background:#FFD600; }

.btn-cancel {
  width:100%; padding:12px; background:transparent; color:#FF3B30;
  border:1px solid #FF3B30; border-radius:12px; font-size:14px;
  font-weight:700; cursor:pointer;
}

.mapboxgl-ctrl-logo, .mapboxgl-ctrl-attrib, .mapboxgl-ctrl-group { display:none !important; }

.loading {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  text-align:center; color:#555; font-size:14px;
}
.loading-icon { font-size:36px; margin-bottom:8px; }
</style>
</head>
<body>

<div id="map">
  <div class="loading" id="loading">
    <div class="loading-icon">🚖</div>
    <div>Ищем водителя...</div>
  </div>
</div>

<div class="panel" id="panel" style="display:none">
  <div class="status-row">
    <div class="status-dot" id="statusDot"></div>
    <div class="status-text" id="statusText">Едет к вам...</div>
  </div>

  <div class="info-row">
    <div class="info-box">
      <div class="info-label">Водитель</div>
      <div class="info-val" id="driverName">—</div>
    </div>
    <div class="info-box">
      <div class="info-label">Статус</div>
      <div class="info-val" id="orderStatus">⏳</div>
    </div>
  </div>

  <div class="route-box">
    <div class="route-line"><div class="rdot from"></div><span id="fromAddr">—</span></div>
    <div class="route-line"><div class="rdot to"></div><span id="toAddr">—</span></div>
  </div>

  <button class="btn-cancel" id="btnCancel" onclick="cancelOrder()">❌ Отменить заказ</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const MAPBOX_TOKEN = 'pk.eyJ1IjoidGx0YWtzbyIsImEiOiJjbW4zYW0yMGkxNG13MnByM2hoZng0OXh2In0.ArR_nk-dVg99VhuuatH2hA';
mapboxgl.accessToken = MAPBOX_TOKEN;

// Берём order_id из URL параметров
const params = new URLSearchParams(window.location.search);
const ORDER_ID = params.get('order');

let map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/light-v11',
  center: [24.7536, 59.4370],
  zoom: 12,
  attributionControl: false
});

let driverMarker = null;
let fromMarker = null;
let toMarker = null;
let pollInterval = null;
let lastStatus = null;
let orderData = null;

const STATUS_TEXT = {
  pending:  '⏳ Ищем водителя...',
  accepted: '🚖 Водитель едет к вам',
  arrived:  '📍 Водитель прибыл!',
  done:     '✅ Поездка завершена',
  cancelled:'❌ Заказ отменён'
};

async function pollStatus() {
  if (!ORDER_ID) return;
  try {
    const r = await fetch(`/api/order_status/${ORDER_ID}`);
    if (!r.ok) return;
    const data = await r.json();
    if (!data.ok) return;

    orderData = data;
    updatePanel(data);

    // Обновляем маркер водителя
    if (data.driver_lat && data.driver_lon) {
      document.getElementById('loading').style.display = 'none';
      if (!driverMarker) {
        const el = document.createElement('div');
        el.style.cssText = 'width:32px;height:32px;background:#FFD600;border:3px solid white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 0 0 6px rgba(255,214,0,0.25)';
        el.textContent = '🚖';
        driverMarker = new mapboxgl.Marker({ element: el })
          .setLngLat([data.driver_lon, data.driver_lat])
          .addTo(map);
        map.flyTo({ center: [data.driver_lon, data.driver_lat], zoom: 14 });
      } else {
        driverMarker.setLngLat([data.driver_lon, data.driver_lat]);
      }
    }

    // Маркеры точек маршрута
    if (data.from_lat && data.from_lon && !fromMarker) {
      fromMarker = new mapboxgl.Marker({ color: '#4CAF50' })
        .setLngLat([data.from_lon, data.from_lat]).addTo(map);
    }
    if (data.to_lat && data.to_lon && !toMarker) {
      toMarker = new mapboxgl.Marker({ color: '#FFD600' })
        .setLngLat([data.to_lon, data.to_lat]).addTo(map);
    }

    // Если заказ завершён или отменён — стоп поллинг
    if (['done', 'cancelled'].includes(data.status)) {
      clearInterval(pollInterval);
      document.getElementById('btnCancel').style.display = 'none';
    }

  } catch(e) {
    console.error(e);
  }
}

function updatePanel(data) {
  document.getElementById('panel').style.display = 'block';
  document.getElementById('loading').style.display = 'none';

  const statusKey = data.status || 'pending';
  document.getElementById('statusText').textContent = STATUS_TEXT[statusKey] || statusKey;
  document.getElementById('driverName').textContent = data.driver_name || '—';

  const statusEmoji = {
    pending: '⏳', accepted: '🚖', arrived: '📍', done: '✅', cancelled: '❌'
  };
  document.getElementById('orderStatus').textContent = statusEmoji[statusKey] || '?';

  // Пульсация только пока активно
  const dot = document.getElementById('statusDot');
  if (['done', 'cancelled'].includes(statusKey)) {
    dot.style.animation = 'none';
    dot.style.background = statusKey === 'done' ? '#4CAF50' : '#FF3B30';
  }
}

async function cancelOrder() {
  if (!ORDER_ID) return;
  if (!confirm('Отменить заказ?')) return;
  try {
    const r = await fetch(`/api/cancel_order_client/${ORDER_ID}`, { method: 'POST' });
    const res = await r.json();
    if (res.ok) {
      clearInterval(pollInterval);
      document.getElementById('statusText').textContent = '❌ Заказ отменён';
      document.getElementById('btnCancel').style.display = 'none';
      setTimeout(() => tg.close(), 1500);
    }
  } catch(e) {
    alert('Ошибка. Попробуйте снова.');
  }
}

// Запуск
if (!ORDER_ID) {
  document.getElementById('loading').innerHTML = '<div class="loading-icon">⚠️</div><div>Заказ не найден</div>';
} else {
  pollStatus();
  pollInterval = setInterval(pollStatus, 3000);
}
</script>
</body>
</html>
